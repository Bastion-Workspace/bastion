# Docker Compose example for GitHub / public use. No hardcoded passwords or secrets.
# Copy to docker-compose.yml and set values in .env (or export) before running.
# Required: POSTGRES_PASSWORD, POSTGRES_APP_PASSWORD, JWT_SECRET_KEY, and API keys (OPENAI_API_KEY, etc.).
# Postgres images bundle backend/sql and data-service/sql (see postgres/Dockerfile). For image-only
# deploys, pull ghcr.io/<org>/bastion-postgres:<tag> from CI. 01_init.sql creates bastion_user with a
# default password; set POSTGRES_APP_PASSWORD to match for first-run, or ALTER USER after init.

services:
  # PostgreSQL Database for Settings and Metadata
  postgres:
    build:
      context: .
      dockerfile: postgres/Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-bastion}-postgres:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-postgres
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
      - PGDATA=/var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c max_connections=400
      -c shared_buffers=512MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_parallel_maintenance_workers=4
    volumes:
      - bastion_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    logging:
        driver: "journald"
        options:
          tag: "bastion-postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-pgbouncer
    environment:
      DATABASE_URL: postgres://bastion_user:${POSTGRES_APP_PASSWORD:-changeme}@postgres:5432/bastion_knowledge_base
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-changeme}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: session
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 80
      RESERVE_POOL_SIZE: 10
      QUERY_WAIT_TIMEOUT: 120
      # Prevent "unsupported startup parameter" errors from asyncpg/other clients
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits,search_path,application_name"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "journald"
      options:
        tag: "bastion-pgbouncer"
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$$POSTGRES_APP_PASSWORD\" pg_isready -h 127.0.0.1 -p 5432 -U bastion_user -d bastion_knowledge_base || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-redis
    logging:
        driver: "journald"
        options:
          tag: "bastion-redis"
    volumes:
      - bastion_redis_data:/data
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes

  searxng:
    image: searxng/searxng:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-searxng
    ports:
      - "8889:8080"
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-changeme-searxng-secret}
      - SEARXNG_URL=http://localhost:8889
    logging:
        driver: "journald"
        options:
          tag: "bastion-searxng"
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    image: ${COMPOSE_PROJECT_NAME:-bastion}-backend:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-backend
    user: "${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}:${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}"
    logging:
        driver: "journald"
        options:
          tag: "bastion-backend"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_started
      searxng:
        condition: service_healthy
      data-service:
        condition: service_started
      crawl4ai-service:
        condition: service_healthy
      tools-service:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://bastion_user:${POSTGRES_APP_PASSWORD:-changeme}@${BASTION_DATABASE_HOST:-pgbouncer}:5432/bastion_knowledge_base
      - LANGGRAPH_POSTGRES_HOST=${LANGGRAPH_POSTGRES_HOST:-postgres}
      - LANGGRAPH_POSTGRES_PORT=${LANGGRAPH_POSTGRES_PORT:-5432}
      - QDRANT_URL=${QDRANT_URL:-http://localhost:6333}
      - NEO4J_URI=${NEO4J_URI:-bolt://localhost:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - REDIS_URL=redis://redis:6379
      - SEARXNG_URL=http://searxng:8080
      - CRAWL4AI_SERVICE_HOST=crawl4ai-service
      - CRAWL4AI_SERVICE_PORT=50055
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
      - OSRM_BASE_URL=${OSRM_BASE_URL:-http://osrm:5000}
      - VALHALLA_BASE_URL=${VALHALLA_BASE_URL:-http://valhalla:8002}
      - ROUTING_PROVIDER=${ROUTING_PROVIDER:-valhalla}
      - USE_VECTOR_SERVICE=true
      - HYBRID_SEARCH_ENABLED=${HYBRID_SEARCH_ENABLED:-false}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-3072}
      - VECTOR_EMBEDDING_ENABLED=${VECTOR_EMBEDDING_ENABLED:-true}
      - VECTOR_EMBEDDING_REQUIRED=${VECTOR_EMBEDDING_REQUIRED:-false}
      - UPLOAD_MAX_SIZE=${UPLOAD_MAX_SIZE:-1500MB}
      - QUALITY_THRESHOLD=${QUALITY_THRESHOLD:-0.7}
      - DEBUG=${DEBUG:-false}
      - SMTP_ENABLED=${SMTP_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@bastion.local}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Bastion AI Workspace}
      - SITE_URL=${SITE_URL:-http://localhost:3051}
      - DATA_SERVICE_HOST=data-service
      - DATA_SERVICE_PORT=50054
      - CRAWL4AI_SERVICE_HOST=crawl4ai-service
      - CRAWL4AI_SERVICE_PORT=50055
      - BACKEND_TOOL_SERVICE_HOST=tools-service
      - BACKEND_TOOL_SERVICE_PORT=50052
      - IMAGE_VISION_SERVICE_HOST=image-vision-service
      - IMAGE_VISION_SERVICE_PORT=50056
      - IMAGE_VISION_ENABLED=${IMAGE_VISION_ENABLED:-true}
      - IMAGE_VISION_REQUIRED=${IMAGE_VISION_REQUIRED:-false}
      - CONNECTIONS_SERVICE_HOST=connections-service
      - CONNECTIONS_SERVICE_PORT=50057
      - VOICE_SERVICE_HOST=voice-service
      - VOICE_SERVICE_PORT=50059
      - DOCUMENT_SERVICE_HOST=document-service
      - DOCUMENT_SERVICE_PORT=50058
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - MICROSOFT_REDIRECT_URI=${MICROSOFT_REDIRECT_URI:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-changeme-internal-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme-jwt-secret}
      - SECRET_KEY=${SECRET_KEY:-bastion-secret-key-change-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@localhost}
      - DEVELOPMENT_BYPASS_AUTH=false
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - USE_GRPC_ORCHESTRATOR=true
      - GRPC_ORCHESTRATOR_PERCENTAGE=100
    ports:
      - "0.0.0.0:8081:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./processed:/app/processed
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 5

  tools-service:
    build:
      context: .
      dockerfile: ./tools-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    image: ${COMPOSE_PROJECT_NAME:-bastion}-tools-service:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-tools-service
    user: "${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}:${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
        driver: "journald"
        options:
          tag: "bastion-tools-service"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_started
      searxng:
        condition: service_healthy
      crawl4ai-service:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://bastion_user:${POSTGRES_APP_PASSWORD:-changeme}@${BASTION_DATABASE_HOST:-pgbouncer}:5432/bastion_knowledge_base
      - QDRANT_URL=${QDRANT_URL:-http://localhost:6333}
      - NEO4J_URI=${NEO4J_URI:-bolt://localhost:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - REDIS_URL=redis://redis:6379
      - SEARXNG_URL=http://searxng:8080
      - CRAWL4AI_SERVICE_HOST=crawl4ai-service
      - CRAWL4AI_SERVICE_PORT=50055
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
      - VECTOR_EMBEDDING_ENABLED=${VECTOR_EMBEDDING_ENABLED:-true}
      - VECTOR_EMBEDDING_REQUIRED=${VECTOR_EMBEDDING_REQUIRED:-false}
      - GRPC_TOOL_SERVICE_PORT=50052
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SECRET_KEY=${SECRET_KEY:-bastion-secret-key-change-in-production}
      - HYBRID_SEARCH_ENABLED=${HYBRID_SEARCH_ENABLED:-false}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-3072}
    ports:
      - "50062:50052"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - mcp-uv-cache:/root/.cache/uv
      - mcp-npm-cache:/root/.npm
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(); s.settimeout(5); s.connect((\"localhost\", 50052)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  cli-worker:
    build:
      context: .
      dockerfile: cli-worker/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    image: ${COMPOSE_PROJECT_NAME:-bastion}-cli-worker:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-cli-worker
    read_only: true
    tmpfs:
      - /scratch:size=2G
      - /tmp:size=256M
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    logging:
      driver: "journald"
      options:
        tag: "bastion-cli-worker"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost',50060)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      - CLI_WORKER_PORT=50060
      - CLI_SCRATCH_DIR=/scratch
      - CLI_DEFAULT_TIMEOUT=120
      - CLI_MAX_OUTPUT_MB=100
      - YTDLP_MAX_FILESIZE_MB=500
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - default

  celery_worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.celery-worker
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    image: ${COMPOSE_PROJECT_NAME:-bastion}-celery-worker:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-celery-worker
    user: "${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}:${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}"
    logging:
        driver: "journald"
        options:
          tag: "bastion-worker"
    command: celery -A services.celery_app worker --loglevel=info --queues=orchestrator,agents,rss,default
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_started
      searxng:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://bastion_user:${POSTGRES_APP_PASSWORD:-changeme}@${BASTION_DATABASE_HOST:-pgbouncer}:5432/bastion_knowledge_base
      - QDRANT_URL=${QDRANT_URL:-http://localhost:6333}
      - NEO4J_URI=${NEO4J_URI:-bolt://localhost:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      - REDIS_URL=redis://redis:6379
      - SEARXNG_URL=http://searxng:8080
      - CRAWL4AI_SERVICE_HOST=crawl4ai-service
      - CRAWL4AI_SERVICE_PORT=50055
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
      - UPLOAD_MAX_SIZE=${UPLOAD_MAX_SIZE:-1500MB}
      - QUALITY_THRESHOLD=${QUALITY_THRESHOLD:-0.7}
      - DEBUG=${DEBUG:-true}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme-jwt-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - SECRET_KEY=${SECRET_KEY:-bastion-secret-key-change-in-production}
      - CELERY_WORKER_TYPE=orchestrator
      - USE_VECTOR_SERVICE=true
      - HYBRID_SEARCH_ENABLED=${HYBRID_SEARCH_ENABLED:-false}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-3072}
      - VECTOR_EMBEDDING_ENABLED=${VECTOR_EMBEDDING_ENABLED:-true}
      - VECTOR_EMBEDDING_REQUIRED=${VECTOR_EMBEDDING_REQUIRED:-false}
    volumes:
      - ./uploads:/app/uploads
      - ./processed:/app/processed
      - ./logs:/app/logs
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.celery-beat
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    image: ${COMPOSE_PROJECT_NAME:-bastion}-celery-beat:latest
    logging:
        driver: "journald"
        options:
          tag: "bastion-beat"
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-celery-beat
    user: "${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}:${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}"
    command: celery -A services.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://bastion_user:${POSTGRES_APP_PASSWORD:-changeme}@${BASTION_DATABASE_HOST:-pgbouncer}:5432/bastion_knowledge_base
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
      - DEBUG=${DEBUG:-true}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme-jwt-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SECRET_KEY=${SECRET_KEY:-bastion-secret-key-change-in-production}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  celery_flower:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.celery-flower
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    image: ${COMPOSE_PROJECT_NAME:-bastion}-celery-flower:latest
    logging:
        driver: "journald"
        options:
          tag: "bastion-flower"
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-celery-flower
    user: "${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}:${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}"
    command: celery -A services.celery_app flower --port=5555
    depends_on:
      - redis
      - celery_worker
    environment:
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "0.0.0.0:5555:5555"
    restart: unless-stopped

  frontend:
    profiles:
      - prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_APP_NAME=${VITE_APP_NAME:-Bastion}
        - VITE_VERSION=${VITE_VERSION:-0.70.0}
        - VITE_MAP_TILE_URL=${VITE_MAP_TILE_URL:-}
        - VITE_PMTILES_URL=${VITE_PMTILES_URL:-/pmtiles/world.pmtiles}
        - VITE_MAP_DARK_STYLE=${VITE_MAP_DARK_STYLE:-}
    image: ${COMPOSE_PROJECT_NAME:-bastion}-frontend:latest
    logging:
        driver: "journald"
        options:
          tag: "bastion-frontend"
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-frontend
    depends_on:
      - backend
      - webdav
    ports:
      - "0.0.0.0:3051:80"
    environment:
      - VITE_APP_NAME=Bastion
      - VITE_VERSION=0.70.0
      - VITE_MAP_TILE_URL=${VITE_MAP_TILE_URL:-}
      - VITE_PMTILES_URL=${VITE_PMTILES_URL:-/pmtiles/world.pmtiles}
    volumes:
      - ${PMTILES_DATA_PATH:-./pmtiles-data}:/data/pmtiles:ro
    restart: unless-stopped

  # Vite dev server (HMR). Profile `dev`. Same host port 3051 as `frontend`.
  # Full stack + dev UI: docker compose --profile dev up --build
  # (Ensure COMPOSE_PROFILES does not include `prod` when using dev, or port 3051 conflicts.)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    image: ${COMPOSE_PROJECT_NAME:-bastion}-frontend-dev:latest
    logging:
        driver: "journald"
        options:
          tag: "bastion-frontend-dev"
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-frontend-dev
    depends_on:
      - backend
      - webdav
    ports:
      - "0.0.0.0:3051:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
      - VITE_APP_NAME=${VITE_APP_NAME:-Bastion}
      - VITE_VERSION=${VITE_VERSION:-0.70.0}
      - VITE_MAP_TILE_URL=${VITE_MAP_TILE_URL:-}
      - VITE_PMTILES_URL=${VITE_PMTILES_URL:-/pmtiles/world.pmtiles}
      - VITE_MAP_DARK_STYLE=${VITE_MAP_DARK_STYLE:-}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.mjs:/app/vite.config.mjs
      - ${PMTILES_DATA_PATH:-./pmtiles-data}:/data/pmtiles:ro
    restart: unless-stopped
    profiles:
      - dev

  webdav:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.webdav
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    image: ${COMPOSE_PROJECT_NAME:-bastion}-webdav:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-webdav
    user: "${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}:${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}"
    logging:
        driver: "journald"
        options:
          tag: "bastion-webdav"
    command: python webdav_server.py
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://bastion_user:${POSTGRES_APP_PASSWORD:-changeme}@${BASTION_DATABASE_HOST:-pgbouncer}:5432/bastion_knowledge_base
      - REDIS_URL=redis://redis:6379
      - WEBDAV_HOST=0.0.0.0
      - WEBDAV_PORT=8001
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme-jwt-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "0.0.0.0:8002:8001"
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  llm-orchestrator:
    build:
      context: .
      dockerfile: ./llm-orchestrator/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-llm-orchestrator
    logging:
        driver: "journald"
        options:
          tag: "bastion-llm-orchestrator"
    depends_on:
      postgres:
        condition: service_healthy
      tools-service:
        condition: service_healthy
      cli-worker:
        condition: service_healthy
    environment:
      - SERVICE_NAME=llm-orchestrator
      - GRPC_PORT=50051
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=bastion_knowledge_base
      - POSTGRES_USER=bastion_user
      - POSTGRES_PASSWORD=${POSTGRES_APP_PASSWORD:-changeme}
      - BACKEND_TOOL_SERVICE_HOST=tools-service
      - BACKEND_TOOL_SERVICE_PORT=50052
      - CLI_WORKER_HOST=cli-worker
      - CLI_WORKER_PORT=50060
      - VOICE_SERVICE_HOST=voice-service
      - VOICE_SERVICE_PORT=50059
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=https://openrouter.ai/api/v1
      - DEFAULT_MODEL=${DEFAULT_MODEL:-anthropic/claude-3.5-sonnet}
      - FAST_MODEL=${FAST_MODEL:-anthropic/claude-3-haiku}
      - CLASSIFICATION_MODEL=${FAST_MODEL:-anthropic/claude-haiku-4.5}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENABLE_STREAMING=true
      - ENABLE_TOOL_CALLBACKS=false
      - MAX_CONCURRENT_REQUESTS=10
      - REQUEST_TIMEOUT_SECONDS=300
    ports:
      - "50051:50051"
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(); s.settimeout(5); s.connect((\"localhost\", 50051)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  vector-service:
    build:
      context: .
      dockerfile: ./vector-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-vector-service
    user: "${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}:${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}"
    logging:
        driver: "journald"
        options:
          tag: "bastion-vector-service"
    # Mapping form allows merging env overrides from docker/compose.vector-*.yml (see docker/README.md).
    environment:
      SERVICE_NAME: vector-service
      GRPC_PORT: "50053"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VECTOR_DB_BACKEND: ${VECTOR_DB_BACKEND:-qdrant}
      QDRANT_URL: ${QDRANT_URL:-http://localhost:6333}
      ES_URL: ${ES_URL:-}
      ES_API_KEY: ${ES_API_KEY:-}
      ES_USERNAME: ${ES_USERNAME:-}
      ES_PASSWORD: ${ES_PASSWORD:-}
      ES_INDEX_PREFIX: ${ES_INDEX_PREFIX:-bastion_}
      ES_VERIFY_CERTS: ${ES_VERIFY_CERTS:-true}
      ES_CA_CERTS: ${ES_CA_CERTS:-}
      MILVUS_URI: ${MILVUS_URI:-}
      MILVUS_TOKEN: ${MILVUS_TOKEN:-}
      MILVUS_DB_NAME: ${MILVUS_DB_NAME:-default}
      MILVUS_CONSISTENCY_LEVEL: ${MILVUS_CONSISTENCY_LEVEL:-Bounded}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-3072}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      OPENAI_MAX_RETRIES: "3"
      OPENAI_TIMEOUT: "30"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-large}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://vllm:8000/v1}
      VLLM_EMBEDDING_MODEL: ${VLLM_EMBEDDING_MODEL:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      PARALLEL_WORKERS: "4"
      BATCH_SIZE: "100"
      MAX_TEXT_LENGTH: "8000"
      EMBEDDING_CACHE_ENABLED: "true"
      EMBEDDING_CACHE_TTL: "10800"
      EMBEDDING_CACHE_DB_PATH: /data/embedding_cache.db
      CACHE_CLEANUP_INTERVAL: "3600"
      HYBRID_SEARCH_ENABLED: ${HYBRID_SEARCH_ENABLED:-false}
    ports:
      - "50053:50053"
    volumes:
      - vector-embedding-cache:/data
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(); s.settimeout(5); s.connect((\"localhost\", 50053)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  postgres-data:
    build:
      context: .
      dockerfile: postgres-data/Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-bastion}-postgres-data:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-postgres-data
    environment:
      - POSTGRES_DB=data_workspace
      - POSTGRES_USER=data_user
      - POSTGRES_PASSWORD=${DATA_WORKSPACE_PASSWORD:-changeme}
      - PGDATA=/var/lib/postgresql/data/pgdata
    logging:
        driver: "journald"
        options:
          tag: "bastion-postgres-data"
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=512MB
      -c work_mem=8MB
    volumes:
      - bastion_data_workspace_db:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U data_user -d data_workspace"]
      interval: 5s
      timeout: 5s
      retries: 10

  data-service:
    build:
      context: .
      dockerfile: ./data-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-data-service
    user: "${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}:${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}"
    depends_on:
      postgres-data:
        condition: service_healthy
    logging:
        driver: "journald"
        options:
          tag: "bastion-data-service"
    environment:
      - SERVICE_NAME=data-service
      - GRPC_PORT=50054
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - POSTGRES_HOST=postgres-data
      - POSTGRES_PORT=5432
      - POSTGRES_DB=data_workspace
      - POSTGRES_USER=data_user
      - POSTGRES_PASSWORD=${DATA_WORKSPACE_PASSWORD:-changeme}
      - MAX_IMPORT_FILE_SIZE=524288000
      - IMPORT_BATCH_SIZE=1000
    ports:
      - "50054:50054"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(); s.settimeout(5); s.connect((\"localhost\", 50054)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  image-vision-service:
    build:
      context: .
      dockerfile: ./image-vision-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-image-vision
    logging:
        driver: "journald"
        options:
          tag: "bastion-image-vision"
    environment:
      - SERVICE_NAME=image-vision-service
      - GRPC_PORT=50056
      - SERVICE_VERSION=0.70.0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEVICE=${IMAGE_VISION_DEVICE:-auto}
      - MAX_WORKERS=4
    ports:
      - "50057:50056"
    volumes:
      - ./uploads:/app/uploads:ro
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(); s.settimeout(5); s.connect((\"localhost\", 50056)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  connections-service:
    build:
      context: .
      dockerfile: ./connections-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    image: ${COMPOSE_PROJECT_NAME:-bastion}-connections-service:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-connections-service
    user: "${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}:${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}"
    logging:
      driver: "journald"
      options:
        tag: "bastion-connections-service"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - SERVICE_NAME=connections-service
      - GRPC_PORT=50057
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MICROSOFT_GRAPH_BASE=https://graph.microsoft.com/v1.0
      - BACKEND_URL=http://backend:8000
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-changeme-internal-key}
      - VOICE_SERVICE_HOST=voice-service
      - VOICE_SERVICE_PORT=50059
    ports:
      - "50058:50057"
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(); s.settimeout(5); s.connect((\"localhost\", 50057)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  voice-service:
    build:
      context: .
      dockerfile: ./voice-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-voice-service
    user: "${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}:${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}"
    logging:
      driver: "journald"
      options:
        tag: "bastion-voice-service"
    environment:
      - SERVICE_NAME=voice-service
      - GRPC_PORT=50059
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - VOICE_STT_PROVIDER=whisper
      - VOICE_TTS_PROVIDER=${VOICE_TTS_PROVIDER:-elevenlabs}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-small}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-auto}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PIPER_VOICE=${PIPER_VOICE:-en_US-arctic-medium}
      - PIPER_BOOTSTRAP=${PIPER_BOOTSTRAP:-1}
    ports:
      - "50060:50059"
    volumes:
      - voice-models:/app/models
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(); s.settimeout(5); s.connect((\"localhost\", 50059)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  document-service:
    build:
      context: .
      dockerfile: ./document-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-document-service
    user: "${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}:${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}"
    logging:
      driver: "journald"
      options:
        tag: "bastion-document-service"
    environment:
      - SERVICE_NAME=document-service
      - GRPC_PORT=50058
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GLINER_MODEL=${GLINER_MODEL:-fastino/gliner2-base-v1}
      - MAX_TEXT_LENGTH=${DOCUMENT_SERVICE_MAX_TEXT_LENGTH:-1000000}
    ports:
      - "50059:50058"
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(); s.settimeout(10); s.connect((\"localhost\", 50058)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  crawl4ai-service:
    build:
      context: .
      dockerfile: ./crawl4ai-service/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
        BASTION_RUNTIME_UID: ${BASTION_RUNTIME_UID:-${BASTION_RUNTIME_PUID:-10001}}
        BASTION_RUNTIME_GID: ${BASTION_RUNTIME_GID:-${BASTION_RUNTIME_PGID:-10001}}
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-crawl4ai-service
    logging:
        driver: "journald"
        options:
          tag: "bastion-crawl4ai-service"
    environment:
      - SERVICE_NAME=crawl4ai-service
      - GRPC_PORT=50055
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_CONCURRENT_CRAWLS=10
      - DEFAULT_TIMEOUT_SECONDS=60
      - DEFAULT_MAX_CONTENT_LENGTH=1000000
      - BROWSER_POOL_SIZE=5
      - HEADLESS=true
      - RATE_LIMIT_SECONDS=1.0
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEFAULT_MODEL=${FAST_MODEL:-anthropic/claude-3-haiku}
    ports:
      - "50055:50055"
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(); s.settimeout(5); s.connect((\"localhost\", 50055)); s.close()' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # Valhalla routing: optional. Requires one-time data setup (see scripts/setup_valhalla_data.sh).
  # Start with: docker compose --profile routing up -d valhalla
  valhalla:
    profiles:
      - routing
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-valhalla
    ports:
      - "8002:8002"
    volumes:
      - ${VALHALLA_DATA_PATH:-./valhalla-data}:/custom_files
    environment:
      - use_tiles_ignore_pbf=True
      - build_elevation=False
      - build_admins=False
      - build_time_zones=False
    restart: unless-stopped
    logging:
      driver: "journald"
      options:
        tag: "bastion-valhalla"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: "300s"

  # ---------------------------------------------------------------------------
  # Optional: Telnet BBS (text-mode Bastion UI). Uncomment to build and run.
  # INTERNAL_SERVICE_KEY must match the backend service exactly (login works without it;
  # AI chat uses /api/internal/*). Same value as connections-service. No impact if omitted.
  # ---------------------------------------------------------------------------
  # bbs-server:
  #   build:
  #     context: .
  #     dockerfile: ./bbs-server/Dockerfile
  #   image: ${COMPOSE_PROJECT_NAME:-bastion}-bbs-server:latest
  #   container_name: ${COMPOSE_PROJECT_NAME:-bastion}-bbs-server
  #   ports:
  #     - "${BBS_TELNET_PORT:-2323}:2323"
  #   environment:
  #     - BACKEND_URL=http://backend:8000
  #     - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY:-changeme-internal-key}
  #     - BBS_NAME=${BBS_NAME:-Bastion BBS}
  #     - BBS_MAX_CONNECTIONS=${BBS_MAX_CONNECTIONS:-20}
  #     - BBS_IDLE_TIMEOUT=${BBS_IDLE_TIMEOUT:-600}
  #     - BBS_THEME=${BBS_THEME:-green}
  #     - LOG_LEVEL=${LOG_LEVEL:-INFO}
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #   networks:
  #     - default
  #   restart: unless-stopped
  #   logging:
  #     driver: "journald"
  #     options:
  #       tag: "bastion-bbs-server"

  # Optional Milvus (VECTOR_DB_BACKEND=milvus). Example:
  #   docker compose -f docker-compose.example.yml --profile milvus up -d milvus-etcd milvus-minio milvus
  # Set vector-service MILVUS_URI=http://milvus:19530 and VECTOR_DB_BACKEND=milvus.
  milvus-etcd:
    profiles:
      - milvus
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - bastion_milvus_etcd:/etcd
    command: >
      etcd
      --advertise-client-urls=http://0.0.0.0:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    networks:
      - default
    restart: unless-stopped

  milvus-minio:
    profiles:
      - milvus
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-milvus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MILVUS_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MILVUS_MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - bastion_milvus_minio:/data
    ports:
      - "9010:9000"
      - "9011:9001"
    networks:
      - default
    restart: unless-stopped

  milvus:
    profiles:
      - milvus
    image: milvusdb/milvus:v2.4.17
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: ${MILVUS_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MILVUS_MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - bastion_milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio
    networks:
      - default
    restart: unless-stopped

  # Optional Elasticsearch (VECTOR_DB_BACKEND=elasticsearch). Example:
  #   docker compose -f docker-compose.example.yml --profile elasticsearch up -d elasticsearch
  # Set vector-service ES_URL=http://elasticsearch:9200 and VECTOR_DB_BACKEND=elasticsearch.
  elasticsearch:
    profiles:
      - elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: ${COMPOSE_PROJECT_NAME:-bastion}-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - bastion_elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - default
    restart: unless-stopped

volumes:
  bastion_redis_data:
    driver: local
  bastion_postgres_data:
    driver: local
  bastion_data_workspace_db:
    driver: local
  voice-models:
    driver: local
  mcp-uv-cache:
    driver: local
  mcp-npm-cache:
    driver: local
  vector-embedding-cache:
    driver: local
  bastion_milvus_data:
    driver: local
  bastion_milvus_etcd:
    driver: local
  bastion_milvus_minio:
    driver: local
  bastion_elasticsearch_data:
    driver: local
networks:
  default:
    name: bastion-network
