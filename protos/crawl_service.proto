syntax = "proto3";

package crawl_service;

// Crawl Service - Dedicated web crawling microservice using Crawl4AI
service CrawlService {
  // Single URL crawl
  rpc Crawl(CrawlRequest) returns (CrawlResponse);
  
  // Parallel multi-URL crawl
  rpc CrawlMany(CrawlManyRequest) returns (CrawlManyResponse);
  
  // Adaptive intelligent crawl
  rpc AdaptiveCrawl(AdaptiveCrawlRequest) returns (CrawlResponse);
  
  // Health check
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ============================================================================
// Single URL Crawl Messages
// ============================================================================

message CrawlRequest {
  string url = 1;
  string extraction_strategy = 2;  // "markdown", "text", "html", "llm_extraction"
  string chunking_strategy = 3;     // "NlpSentenceChunking", "RegexChunking", etc.
  optional string css_selector = 4;
  optional string llm_question = 5;  // For LLM extraction
  optional int32 max_content_length = 6;
  optional bool include_links = 7;
  optional bool include_metadata = 8;
  optional int32 timeout_seconds = 9;
  optional bool virtual_scroll = 10;
  optional double scroll_delay = 11;
  optional bool use_fit_markdown = 12;  // Use fit_markdown for LLM optimization
  optional string user_id = 13;
}

message CrawlResponse {
  bool success = 1;
  string url = 2;
  string title = 3;
  string content = 4;  // Main content (markdown/text/html based on strategy)
  string markdown = 5;  // Always include markdown version
  string html = 6;      // Original HTML
  map<string, string> metadata = 7;
  repeated string links = 8;
  repeated string images = 9;
  int32 content_length = 10;
  float fetch_time_seconds = 11;
  int32 status_code = 12;
  optional string error = 13;
  optional string extracted_content = 14;  // For LLM extraction results
}

// ============================================================================
// Parallel Multi-URL Crawl Messages
// ============================================================================

message CrawlManyRequest {
  repeated string urls = 1;
  string extraction_strategy = 2;
  string chunking_strategy = 3;
  optional int32 max_concurrent = 4;  // Default: 5
  optional double rate_limit_seconds = 5;  // Delay between requests
  optional string css_selector = 6;
  optional string llm_question = 7;
  optional int32 max_content_length = 8;
  optional bool include_links = 9;
  optional bool include_metadata = 10;
  optional int32 timeout_seconds = 11;
  optional bool virtual_scroll = 12;
  optional double scroll_delay = 13;
  optional bool use_fit_markdown = 14;
  optional string user_id = 15;
}

message CrawlManyResponse {
  bool success = 1;
  repeated CrawlResponse results = 2;
  int32 urls_requested = 3;
  int32 successful_crawls = 4;
  int32 failed_crawls = 5;
  int64 total_content_length = 6;
  float total_time_seconds = 7;
  optional string error = 8;
}

// ============================================================================
// Adaptive Crawl Messages
// ============================================================================

message AdaptiveCrawlRequest {
  string seed_url = 1;
  string query = 2;  // What information to find
  optional int32 max_depth = 3;  // Default: 3
  optional int32 max_pages = 4;  // Default: 50
  optional bool stop_when_satisfied = 5;  // Default: true
  optional string extraction_strategy = 6;  // Default: "markdown"
  optional bool use_fit_markdown = 7;
  optional string user_id = 8;
}

// ============================================================================
// Health Check Messages
// ============================================================================

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;  // "healthy", "degraded", "unhealthy"
  bool crawl4ai_available = 2;
  bool browser_available = 3;
  string service_version = 4;
  map<string, string> details = 5;
}

// ============================================================================
// Browser Session Service - Playwright-based interactive automation
// ============================================================================

service BrowserSessionService {
  rpc CreateSession(BrowserSessionConfig) returns (BrowserSessionRef);
  rpc ExecuteAction(BrowserActionRequest) returns (BrowserActionResult);
  rpc DownloadFile(BrowserDownloadRequest) returns (BrowserDownloadResult);
  rpc DestroySession(BrowserSessionRef) returns (BrowserEmpty);
  rpc SaveSessionState(BrowserSessionRef) returns (BrowserSessionStateResult);
  rpc InspectPage(BrowserSessionRef) returns (BrowserInspectResult);
}

message BrowserSessionConfig {
  optional string user_id = 1;
  optional bool persist_cookies = 2;
  optional string user_agent = 3;
  optional int32 timeout_seconds = 4;
  optional string storage_state_json = 5;  // Restore cookies/localStorage from previous session
}

message BrowserSessionRef {
  string session_id = 1;
}

message BrowserEmpty {}

// Action types for ExecuteAction
message NavigateAction {
  string url = 1;
}

message ClickAction {
  string selector = 1;
  optional int32 click_x = 2;  // Coordinate-based click (viewport pixels)
  optional int32 click_y = 3;
}

message FillAction {
  string selector = 1;
  string value = 2;
}

message WaitAction {
  optional string selector = 1;   // Wait for selector to appear
  optional int32 timeout_seconds = 2;  // Or wait for timeout
}

message ExtractAction {
  optional string selector = 1;  // Extract from selector, or full page if omitted
}

message ScreenshotAction {}

// Scroll the page (e.g. for infinite scroll). Default: down, 800px.
message ScrollAction {
  optional string direction = 1;  // "down" or "up", default "down"
  optional int32 amount_pixels = 2;  // default 800
}

// Keypress (e.g. Enter, Tab) for form submission and navigation.
message KeypressAction {
  string key = 1;  // "Enter", "Tab", "Escape", etc.
}

message BrowserActionRequest {
  string session_id = 1;
  oneof action {
    NavigateAction navigate = 2;
    ClickAction click = 3;
    FillAction fill = 4;
    WaitAction wait = 5;
    ExtractAction extract = 6;
    ScreenshotAction screenshot = 7;
    ScrollAction scroll = 8;
    KeypressAction keypress = 9;
  }
}

message BrowserActionResult {
  bool success = 1;
  optional string error = 2;
  optional string extracted_content = 3;  // For extract action
  optional bytes screenshot_png = 4;      // For screenshot action
}

message BrowserDownloadRequest {
  string session_id = 1;
  string trigger_selector = 2;   // Click this element to start the download
  optional string fallback_url = 3;  // Or fetch this URL directly
  optional int32 timeout_seconds = 4;
}

message BrowserDownloadResult {
  bool success = 1;
  bytes file_content = 2;
  string filename = 3;
  string mime_type = 4;
  int64 file_size_bytes = 5;
  optional string error = 6;
}

message BrowserSessionStateResult {
  bool success = 1;
  optional string state_json = 2;  // Playwright storage state as JSON
  optional string error = 3;
}

message BrowserInspectResult {
  bool success = 1;
  optional string page_structure = 2;  // JSON: accessibility tree with selectors for interactive elements
  optional string error = 3;
}


