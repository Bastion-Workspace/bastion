// Universal Todo Messages
message ListTodosRequest {
  string user_id = 1;
  string scope = 2;  // "all", "inbox", or file path
  repeated string states = 3;
  repeated string tags = 4;
  string query = 5;
  int32 limit = 6;  // 0 = no cap (all matches); >0 caps result count
  bool include_archives = 7;
  bool include_body = 8;
  int32 closed_since_days = 9;  // only DONE items closed in the last N days (0 = omit filter)
}

message TodoResult {
  string filename = 1;
  string file_path = 2;
  string heading = 3;
  int32 level = 4;
  int32 line_number = 5;  // 0-based
  string todo_state = 6;
  repeated string tags = 7;
  string scheduled = 8;
  string deadline = 9;
  string document_id = 10;
  string preview = 11;
  string body = 12;  // body/description text under the heading
  string closed = 13;  // when item was marked DONE (org CLOSED timestamp)
}

message ListTodosResponse {
  bool success = 1;
  repeated TodoResult results = 2;
  int32 count = 3;
  int32 files_searched = 4;
  optional string error = 5;
}

message CreateTodoRequest {
  string user_id = 1;
  string text = 2;
  optional string file_path = 3;  // omit for inbox
  string state = 4;
  repeated string tags = 5;
  optional string scheduled = 6;
  optional string deadline = 7;
  optional string priority = 8;
  optional string body = 9;  // body/description lines under the heading
  optional int32 heading_level = 10;  // 1-6 org stars (* to ******); default 1
  optional int32 insert_after_line_number = 11;  // 0-based; if set, insert after this line; else append at end
}

message CreateTodoResponse {
  bool success = 1;
  string file_path = 2;
  int32 line_number = 3;
  string heading = 4;
  optional string error = 5;
}

message UpdateTodoRequest {
  string user_id = 1;
  string file_path = 2;
  int32 line_number = 3;  // 0-based
  optional string heading_text = 4;
  optional string new_state = 5;
  optional string new_text = 6;
  repeated string add_tags = 7;
  repeated string remove_tags = 8;
  optional string scheduled = 9;
  optional string deadline = 10;
  optional string priority = 11;
  optional string new_body = 12;  // replace body under the heading
}

message UpdateTodoResponse {
  bool success = 1;
  string file_path = 2;
  int32 line_number = 3;
  string new_line = 4;
  optional string error = 5;
}

message ToggleTodoRequest {
  string user_id = 1;
  string file_path = 2;
  int32 line_number = 3;  // 0-based
  optional string heading_text = 4;
}

message ToggleTodoResponse {
  bool success = 1;
  string file_path = 2;
  int32 line_number = 3;
  string new_line = 4;
  optional string error = 5;
}

message DeleteTodoRequest {
  string user_id = 1;
  string file_path = 2;
  int32 line_number = 3;  // 0-based
  optional string heading_text = 4;
}

message DeleteTodoResponse {
  bool success = 1;
  string file_path = 2;
  int32 deleted_line_count = 3;
  optional string error = 4;
}

message ArchiveDoneTodosRequest {
  string user_id = 1;
  optional string file_path = 2;  // omit for inbox
  bool preview_only = 3;           // resolve path + count without archiving
  bool archive_all = 4;            // deprecated: unused; use line_number for single-entry
  optional int32 line_number = 5;  // 0-based; if set, archive only this entry (any state). Omit for bulk closed.
}

message ArchiveDoneTodosResponse {
  bool success = 1;
  string path = 2;
  string archived_to = 3;
  int32 archived_count = 4;
  optional string error = 5;
  bool directive_found = 6;   // was #+ARCHIVE: present in file?
  string directive_value = 7; // raw directive e.g. "./Archive/%s_archive.org"
}

message RefileTodoRequest {
  string user_id = 1;
  string source_file = 2;      // file_path from list_todos (absolute or relative)
  int32 source_line = 3;       // 0-based line_number from list_todos
  string target_file = 4;      // destination file path
  optional int32 target_heading_line = 5;  // 0-based line of target heading; omit = append at file root
}

message RefileTodoResponse {
  bool success = 1;
  string source_file = 2;
  string target_file = 3;
  int32 lines_moved = 4;
  optional string error = 5;
}

message DiscoverRefileTargetsRequest {
  string user_id = 1;
}

message RefileTarget {
  string file = 1;
  string filename = 2;
  repeated string heading_path = 3;
  int32 heading_line = 4;      // 0-based
  string display_name = 5;
  int32 level = 6;
}

message DiscoverRefileTargetsResponse {
  bool success = 1;
  repeated RefileTarget targets = 2;
  optional string error = 3;
}

// Web Search Messages
message WebSearchRequest {
  string query = 1;
  int32 max_results = 2;
  string user_id = 3;
}

message WebSearchResponse {
  repeated WebSearchResult results = 1;
}

message WebSearchResult {
  string title = 1;
  string url = 2;
  string snippet = 3;
  float relevance_score = 4;
}

message WebCrawlRequest {
  string url = 1;  // Single URL (for backward compatibility)
  repeated string urls = 2;  // Multiple URLs
  string user_id = 3;
  optional bool paginate = 4;
  optional int32 max_pages = 5;               // default 10
  optional string pagination_param = 6;       // e.g. "page"
  optional int32 start_page = 7;              // e.g. 0
  optional string next_page_css_selector = 8; // e.g. "li.pager-next a"
  optional string css_selector = 9;          // content extraction selector (pass-through to Crawl4AI)
  optional int32 max_urls = 10;               // max URLs to crawl (default 5 for backward compat; e.g. 20 for bulk scrape path)
}

message WebCrawlResponse {
  repeated WebCrawlResult results = 1;
}

message SearchAndCrawlRequest {
  string query = 1;
  int32 num_results = 2;
  string user_id = 3;
}

message SearchAndCrawlResponse {
  repeated WebSearchResult search_results = 1;
  repeated WebCrawlResult crawl_results = 2;
}

message WebCrawlResult {
  string url = 1;
  string title = 2;
  string content = 3;
  string html = 4;  // HTML content
  map<string, string> metadata = 5;
  repeated string images = 6;
  repeated string links = 7;
}

// Recursive Website Crawling Messages
message RecursiveWebsiteCrawlRequest {
  string start_url = 1;
  int32 max_pages = 2;
  int32 max_depth = 3;
  string user_id = 4;
}

message RecursiveWebsiteCrawlResponse {
  bool success = 1;
  string start_url = 2;
  string base_domain = 3;
  string crawl_session_id = 4;
  int32 total_items_crawled = 5;
  int32 html_pages_crawled = 6;
  int32 images_downloaded = 7;
  int32 documents_downloaded = 8;
  int32 total_items_failed = 9;
  int32 max_depth_reached = 10;
  float elapsed_time_seconds = 11;
  repeated CrawledPage crawled_pages = 12;
  optional string error = 13;
}

message CrawledPage {
  string url = 1;
  string content_type = 2;  // html, image, document
  string markdown_content = 3;
  string html_content = 4;
  map<string, string> metadata = 5;
  repeated string internal_links = 6;
  repeated string image_links = 7;
  repeated string document_links = 8;
  int32 depth = 9;
  optional string parent_url = 10;
  string crawl_time = 11;
  optional bytes binary_content = 12;  // For images/documents
  optional string filename = 13;
  optional string mime_type = 14;
  optional int32 size_bytes = 15;
}

// Domain-scoped crawl messages
message DomainCrawlRequest {
  string seed_url = 1;
  string query_criteria = 2;
  int32 max_pages = 3;
  int32 max_depth = 4;
  optional string allowed_path_prefix = 5;
  bool include_pdfs = 6;
  string user_id = 7;
}

message DomainCrawlResponse {
  bool success = 1;
  string domain = 2;
  int32 successful_crawls = 3;
  int32 urls_considered = 4;
  repeated DomainCrawlResult results = 5;
  optional string error = 6;
}

message DomainCrawlResult {
  string url = 1;
  string title = 2;
  string full_content = 3;
  map<string, string> metadata = 4;
  float relevance_score = 5;
  bool success = 6;
}

// Query Expansion Messages
message QueryExpansionRequest {
  string query = 1;
  int32 num_variations = 2;
  string user_id = 3;
  optional string conversation_context = 4;  // Last 2 messages formatted as "User: ...\nAssistant: ..."
}

message QueryExpansionResponse {
  string original_query = 1;
  repeated string expanded_queries = 2;
  repeated string key_entities = 3;
  int32 expansion_count = 4;
}

// Conversation Cache Messages
message CacheSearchRequest {
  string query = 1;
  string conversation_id = 2;
  int32 freshness_hours = 3;
  string user_id = 4;
}

message CacheSearchResponse {
  repeated CacheEntry entries = 1;
  bool cache_hit = 2;
}

message CacheEntry {
  string content = 1;
  string timestamp = 2;
  string agent_name = 3;
  float relevance_score = 4;
}

// Image Search Messages
message ImageSearchRequest {
  string query = 1;
  string image_type = 2;  // Optional: comic, artwork, meme, screenshot, etc.
  string date = 3;  // Optional: YYYY-MM-DD format
  string author = 4;  // Optional: author/creator name
  string series = 5;  // Optional: series/comic name (e.g., "Dilbert")
  int32 limit = 6;  // Maximum number of results
  string user_id = 7;
  bool is_random = 8;  // If true, return random images instead of semantic search
  repeated string exclude_document_ids = 9;  // Document IDs already shown to user (for "show me more")
}

message ImageSearchResponse {
  string results = 1;  // Markdown-formatted results with image URLs (backward compat)
  bool success = 2;
  string error = 3;
  repeated ImageMetadata metadata = 4;  // Structured metadata for LLM
  optional string structured_images_json = 5;  // JSON array of {url, alt_text, type, metadata} for UI/Telegram
}

message ImageMetadata {
  string title = 1;
  string date = 2;
  string series = 3;
  string author = 4;
  string content = 5;  // Full description from metadata
  repeated string tags = 6;
  string image_type = 7;
}

// Image Generation Messages
message ImageGenerationRequest {
  string prompt = 1;
  string size = 2;  // e.g., "1024x1024"
  string format = 3;  // e.g., "png", "jpg"
  optional int32 seed = 4;
  int32 num_images = 5;
  optional string negative_prompt = 6;
  string user_id = 7;
  optional string model = 8;  // User's preferred image generation model (overrides settings)
  
  // Image-to-image generation support
  optional bytes reference_image_data = 9;  // Base64-encoded reference image
  optional string reference_image_url = 10;  // Alternative: URL to reference image
  optional float reference_strength = 11;  // 0.0-1.0, default 0.5 (how much to follow reference)
  optional string folder_id = 12;  // Target folder for promoted document (user collection)
}

message ImageGenerationResponse {
  bool success = 1;
  string model = 2;
  string prompt = 3;
  string size = 4;
  string format = 5;
  repeated GeneratedImage images = 6;
  optional string error = 7;
}

message GeneratedImage {
  string filename = 1;
  string path = 2;
  string url = 3;
  int32 width = 4;
  int32 height = 5;
  string format = 6;
  optional string document_id = 7;  // Set when image is promoted to document_metadata
}

message GetReferenceImageForObjectRequest {
  string object_name = 1;  // e.g. "Farmall Tractor", "BMW i3"
  string user_id = 2;
}

message GetReferenceImageForObjectResponse {
  bool success = 1;
  optional bytes reference_image_data = 2;  // Image bytes for use as reference
  optional string document_id = 3;
  optional string error = 4;
}

// File Creation Messages
message CreateUserFileRequest {
  string user_id = 1;
  string filename = 2;
  string content = 3;
  optional string folder_id = 4;
  optional string folder_path = 5;  // e.g., "Projects/Electronics" - will create if needed
  optional string title = 6;
  repeated string tags = 7;
  optional string category = 8;
  optional bytes binary_content = 9;  // When set, content is ignored; used for PDF, images, etc.
}

message CreateUserFileResponse {
  bool success = 1;
  string document_id = 2;
  string filename = 3;
  string folder_id = 4;
  string message = 5;
  optional string error = 6;
}

// Browser automation (Playwright) - one step in a sequence
message BrowserStepProto {
  string action = 1;   // "navigate", "click", "fill", "wait", "download", "extract"
  optional string selector = 2;
  optional string value = 3;
  optional string wait_for = 4;
  optional int32 timeout_seconds = 5;
  optional string url = 6;  // For "navigate" action
}

message BrowserDownloadToolRequest {
  string user_id = 1;
  string url = 2;
  repeated BrowserStepProto steps = 3;   // Optional sequence before download
  string download_selector = 4;          // CSS selector to click to trigger download
  optional string connection_id = 5;     // For credential lookup (login)
  string folder_path = 6;                // Where to save the file (e.g. "Research/Reports")
  repeated string tags = 7;
  optional string title = 8;
  optional string goal = 9;               // Natural language description for logging
}

message BrowserDownloadToolResponse {
  bool success = 1;
  string document_id = 2;
  string filename = 3;
  int64 file_size_bytes = 4;
  optional string error = 5;
}

// Universal browser run: same steps, parameterized final action
message BrowserRunToolRequest {
  string user_id = 1;
  string url = 2;
  repeated BrowserStepProto steps = 3;
  string final_action_type = 4;  // "download", "click", "extract", "screenshot"
  string final_selector = 5;      // For download: click to trigger; click: element; extract: selector (empty=body); screenshot: optional element
  string folder_path = 6;         // Required for download; optional for screenshot (save PNG); unused for click/extract
  optional string connection_id = 7;
  repeated string tags = 8;
  optional string title = 9;
  optional string goal = 10;
}

message BrowserRunToolResponse {
  bool success = 1;
  optional string error = 2;
  optional string document_id = 3;   // Download or screenshot (saved)
  optional string filename = 4;
  optional int64 file_size_bytes = 5;
  optional string extracted_text = 6;  // Click (optional) or extract
  optional string message = 7;         // Click success message
  optional string images_markdown = 8; // Screenshot as data URI markdown for chat/Telegram/Discord
}

// Granular browser automation (session-scoped)
message BrowserOpenSessionRequest {
  string user_id = 1;
  string site_domain = 2;  // e.g. "example.com" for state restore key
  optional int32 timeout_seconds = 3;
}

message BrowserOpenSessionResponse {
  bool success = 1;
  optional string session_id = 2;
  optional string error = 3;
}

message BrowserNavigateRequest {
  string user_id = 1;
  string session_id = 2;
  string url = 3;
}

message BrowserNavigateResponse {
  bool success = 1;
  optional string page_title = 2;
  optional string current_url = 3;
  optional string error = 4;
}

message BrowserClickRequest {
  string user_id = 1;
  string session_id = 2;
  string selector = 3;
}

message BrowserClickResponse {
  bool success = 1;
  optional string error = 2;
}

message BrowserFillRequest {
  string user_id = 1;
  string session_id = 2;
  string selector = 3;
  string value = 4;
}

message BrowserFillResponse {
  bool success = 1;
  optional string error = 2;
}

message BrowserWaitRequest {
  string user_id = 1;
  string session_id = 2;
  optional string selector = 3;   // Wait for selector
  optional int32 timeout_seconds = 4;  // Or fixed delay
}

message BrowserWaitResponse {
  bool success = 1;
  bool found = 2;  // true if selector appeared (or N/A for timeout)
  optional string error = 3;
}

message BrowserScrollRequest {
  string user_id = 1;
  string session_id = 2;
  optional string direction = 3;   // "down" or "up", default "down"
  optional int32 amount_pixels = 4;  // default 800
}

message BrowserScrollResponse {
  bool success = 1;
  optional string error = 2;
}

message BrowserExtractRequest {
  string user_id = 1;
  string session_id = 2;
  string selector = 3;  // Empty = full body
}

message BrowserExtractResponse {
  bool success = 1;
  optional string extracted_text = 2;
  optional string error = 3;
}

message BrowserInspectRequest {
  string user_id = 1;
  string session_id = 2;
}

message BrowserInspectResponse {
  bool success = 1;
  optional string page_structure = 2;  // JSON
