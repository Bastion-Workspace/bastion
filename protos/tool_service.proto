  rpc GetEntity(EntityRequest) returns (EntityResponse);
  rpc FindCoOccurringEntities(FindCoOccurringEntitiesRequest) returns (FindCoOccurringEntitiesResponse);
  
  // Weather operations
  rpc GetWeatherData(WeatherRequest) returns (WeatherResponse);
  
  // Image generation operations
  rpc GenerateImage(ImageGenerationRequest) returns (ImageGenerationResponse);
  rpc GetReferenceImageForObject(GetReferenceImageForObjectRequest) returns (GetReferenceImageForObjectResponse);

  // Audio transcription operations (future implementation)
  rpc TranscribeAudio(TranscribeAudioRequest) returns (TranscribeAudioResponse);
  
  // Org-mode operations
  rpc SearchOrgFiles(OrgSearchRequest) returns (OrgSearchResponse);
  rpc GetOrgInboxItems(OrgInboxRequest) returns (OrgInboxResponse);
  
  // Org Inbox management operations
