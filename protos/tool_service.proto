  // Agent Factory: profile and playbook for custom agent execution
  rpc GetAgentProfile(GetAgentProfileRequest) returns (GetAgentProfileResponse);
  rpc ListAutoRoutableProfiles(ListAutoRoutableProfilesRequest) returns (ListAutoRoutableProfilesResponse);
  rpc GetPlaybook(GetPlaybookRequest) returns (GetPlaybookResponse);
  rpc LogAgentExecution(LogAgentExecutionRequest) returns (LogAgentExecutionResponse);
  rpc ParkApproval(ParkApprovalRequest) returns (ParkApprovalResponse);
  rpc GetUserShellPolicy(GetUserShellPolicyRequest) returns (GetUserShellPolicyResponse);
  rpc UpsertShellPolicyRule(UpsertShellPolicyRuleRequest) returns (UpsertShellPolicyRuleResponse);
