message AgentRunRecord {
  string execution_id = 1;
  string agent_name = 2;
  string query = 3;
  string status = 4;
  string started_at = 5;
  optional int32 duration_ms = 6;
  repeated string connectors_called = 7;
  int32 entities_discovered = 8;
  optional string error_details = 9;
  int32 steps_completed = 10;
  int32 steps_total = 11;
}

message GetAgentRunHistoryRequest {
  string user_id = 1;
  optional string agent_profile_id = 2;  // omit = all user's agents
  optional int32 limit = 3;              // default 10, max 50
  optional string status = 4;            // completed, failed, running
  optional string start_date = 5;        // YYYY-MM-DD
  optional string end_date = 6;
}

message GetAgentRunHistoryResponse {
  bool success = 1;
  repeated AgentRunRecord runs = 2;
  int32 total = 3;
  string agent_name = 4;  // populated when agent_profile_id provided
  string error = 5;
}

message ExecutionStepRecord {
  int32 step_index = 1;
  string step_name = 2;
  string step_type = 3;
  string action_name = 4;
  string status = 5;
  string started_at = 6;
  string completed_at = 7;
  optional int32 duration_ms = 8;
  string inputs_json = 9;    // truncated JSON string
  string outputs_json = 10;  // truncated JSON string
  string error_details = 11;
  string tool_call_trace_json = 12;  // JSON array of tool calls (truncated when large)
  int32 input_tokens = 13;
  int32 output_tokens = 14;
}

message GetExecutionTraceRequest {
  string user_id = 1;
  string execution_id = 2;
  optional bool include_io = 3;         // default true when unset in handler
  optional bool include_tool_calls = 4; // default false when unset in handler
}

message GetExecutionTraceResponse {
  bool success = 1;
  string execution_id = 2;
  string agent_name = 3;
  string query = 4;
  string status = 5;
  string started_at = 6;
  string completed_at = 7;
  optional int32 duration_ms = 8;
  optional int32 tokens_input = 9;
  optional int32 tokens_output = 10;
  optional string cost_usd = 11;
  string model_used = 12;
  string error_details = 13;
  repeated ExecutionStepRecord steps = 14;
  string error = 15;
}

