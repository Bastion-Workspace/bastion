syntax = "proto3";

package tool_service;

// Audio Transcription Messages (Future Implementation)
// Defined early so they can be used in service RPC declarations
message TranscribeAudioRequest {
  string audio_file_path = 1;
  optional string language = 2;  // Language code (e.g., "en", "es", "fr") - auto-detect if not provided
  optional string model = 3;  // Transcription model (e.g., "whisper-1", "whisper-large-v3")
  string user_id = 4;
}

message TranscriptSegment {
  int32 start_time_ms = 1;  // Start time in milliseconds
  int32 end_time_ms = 2;  // End time in milliseconds
  string text = 3;  // Transcript text for this segment
  float confidence = 4;  // Confidence score (0.0-1.0)
}

message TranscribeAudioResponse {
  bool success = 1;
  string transcript = 2;
  optional string language_detected = 3;
  repeated TranscriptSegment segments = 4;  // Timestamped segments
  optional string error = 5;
}

// Help documentation search
message SearchHelpDocsRequest {
  string query = 1;
  string user_id = 2;
  int32 limit = 3;
}
message HelpSearchResult {
  string topic_id = 1;
  string title = 2;
  string content = 3;
  float score = 4;
}
message SearchHelpDocsResponse {
  repeated HelpSearchResult results = 1;
  int32 total_count = 2;
}

// Tool Service - Backend exposes data access to orchestrator
service ToolService {
  // Document / folder / file-edit RPCs moved to document_service.proto (DocumentService).

  // RSS operations
  rpc SearchRSSFeeds(RSSSearchRequest) returns (RSSSearchResponse);
  rpc GetRSSArticles(RSSArticlesRequest) returns (RSSArticlesResponse);
  rpc ListStarredRSSArticles(ListStarredRSSArticlesRequest) returns (ListStarredRSSArticlesResponse);
  
  // RSS management operations
  rpc AddRSSFeed(AddRSSFeedRequest) returns (AddRSSFeedResponse);
  rpc ListRSSFeeds(ListRSSFeedsRequest) returns (ListRSSFeedsResponse);
  rpc RefreshRSSFeed(RefreshRSSFeedRequest) returns (RefreshRSSFeedResponse);
  rpc DeleteRSSFeed(DeleteRSSFeedRequest) returns (DeleteRSSFeedResponse);
  rpc MarkArticleRead(MarkArticleReadRequest) returns (MarkArticleReadResponse);
  rpc MarkArticleUnread(MarkArticleUnreadRequest) returns (MarkArticleUnreadResponse);
  rpc SetArticleStarred(SetArticleStarredRequest) returns (SetArticleStarredResponse);
  rpc GetUnreadCounts(GetUnreadCountsRequest) returns (GetUnreadCountsResponse);
  rpc ToggleFeedActive(ToggleFeedActiveRequest) returns (ToggleFeedActiveResponse);
  
  // Entity operations
