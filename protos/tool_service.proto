  rpc ListDataConnectors(ListDataConnectorsRequest) returns (ListDataConnectorsResponse);
  rpc GetDataConnector(GetDataConnectorRequest) returns (GetDataConnectorResponse);
  rpc UpdateDataConnector(UpdateDataConnectorRequest) returns (UpdateDataConnectorResponse);
  rpc ListPlaybooks(ListPlaybooksRequest) returns (ListPlaybooksResponse);
  rpc ListAgentSchedules(ListAgentSchedulesRequest) returns (ListAgentSchedulesResponse);
  rpc ListAgentDataSources(ListAgentDataSourcesRequest) returns (ListAgentDataSourcesResponse);
  rpc ListAgentProfiles(ListAgentProfilesRequest) returns (ListAgentProfilesResponse);
  rpc CreateControlPane(CreateControlPaneRequest) returns (CreateControlPaneResponse);
  rpc UpdateControlPane(UpdateControlPaneRequest) returns (UpdateControlPaneResponse);
  rpc DeleteControlPane(DeleteControlPaneRequest) returns (DeleteControlPaneResponse);
  rpc ExecuteControlPaneAction(ExecuteControlPaneActionRequest) returns (ExecuteControlPaneActionResponse);
  rpc ListAvailableLlmModels(ListAvailableLlmModelsRequest) returns (ListAvailableLlmModelsResponse);
  rpc SetAgentProfileStatus(SetAgentProfileStatusRequest) returns (SetAgentProfileStatusResponse);
  rpc UpdateAgentProfile(UpdateAgentProfileRequest) returns (UpdateAgentProfileResponse);
  rpc DeleteAgentProfile(DeleteAgentProfileRequest) returns (DeleteAgentProfileResponse);
  rpc UpdatePlaybook(UpdatePlaybookRequest) returns (UpdatePlaybookResponse);
  rpc DeletePlaybook(DeletePlaybookRequest) returns (DeletePlaybookResponse);
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);
  rpc ListSkillSummaries(ListSkillSummariesRequest) returns (ListSkillSummariesResponse);
  rpc GetSkillBySlug(GetSkillBySlugRequest) returns (GetSkillBySlugResponse);
  rpc GetSkillsBySlugs(GetSkillsBySlugsRequest) returns (GetSkillsBySlugsResponse);
  rpc GetCandidateForSlug(GetCandidateForSlugRequest) returns (GetCandidateForSlugResponse);
  rpc CreateSkill(CreateSkillRequest) returns (CreateSkillResponse);
  rpc UpdateSkill(UpdateSkillRequest) returns (UpdateSkillResponse);

  // Team operations (read posts, create post/comment for Agent Factory)
  rpc ReadTeamPosts(ReadTeamPostsRequest) returns (ReadTeamPostsResponse);
  rpc CreateTeamPost(CreateTeamPostRequest) returns (CreateTeamPostResponse);

  // Agent-initiated notifications (outbound messaging + conversation creation)
  rpc SendOutboundMessage(SendOutboundMessageRequest) returns (SendOutboundMessageResponse);
  rpc CreateAgentConversation(CreateAgentConversationRequest) returns (CreateAgentConversationResponse);
  rpc CreateAgentMessage(CreateAgentMessageRequest) returns (CreateAgentMessageResponse);
  rpc AppendLineAgentChatMessage(AppendLineAgentChatMessageRequest) returns (AppendLineAgentChatMessageResponse);
  rpc ReadTeamTimeline(ReadTeamTimelineRequest) returns (ReadTeamTimelineResponse);
  rpc ReadAgentMessages(ReadAgentMessagesRequest) returns (ReadAgentMessagesResponse);
  rpc GetTeamStatusBoard(GetTeamStatusBoardRequest) returns (GetTeamStatusBoardResponse);
  rpc SetWorkspaceEntry(SetWorkspaceEntryRequest) returns (SetWorkspaceEntryResponse);
  rpc ReadWorkspace(ReadWorkspaceRequest) returns (ReadWorkspaceResponse);
  rpc GetGoalAncestry(GetGoalAncestryRequest) returns (GetGoalAncestryResponse);
  rpc GetTeamGoalsTree(GetTeamGoalsTreeRequest) returns (GetTeamGoalsTreeResponse);
  rpc GetGoalsForAgent(GetGoalsForAgentRequest) returns (GetGoalsForAgentResponse);
  rpc UpdateGoalProgress(UpdateGoalProgressRequest) returns (UpdateGoalProgressResponse);
  rpc CreateAgentTask(CreateAgentTaskRequest) returns (CreateAgentTaskResponse);
  rpc GetAgentWorkQueue(GetAgentWorkQueueRequest) returns (GetAgentWorkQueueResponse);
  rpc UpdateTaskStatus(UpdateTaskStatusRequest) returns (UpdateTaskStatusResponse);
  rpc AssignTaskToAgent(AssignTaskToAgentRequest) returns (AssignTaskToAgentResponse);
  rpc GetUserNotificationPreferences(GetUserNotificationPreferencesRequest) returns (GetUserNotificationPreferencesResponse);
  rpc GetMyProfile(GetMyProfileRequest) returns (GetMyProfileResponse);
  rpc UpsertUserFact(UpsertUserFactRequest) returns (UpsertUserFactResponse);
  rpc GetUserFacts(GetUserFactsRequest) returns (GetUserFactsResponse);
  rpc ReadScratchpad(ReadScratchpadRequest) returns (ReadScratchpadResponse);
  rpc WriteScratchpadPad(WriteScratchpadPadRequest) returns (WriteScratchpadPadResponse);

  // Local proxy (Bastion Local Proxy daemon)
  rpc InvokeDeviceTool(InvokeDeviceToolRequest) returns (InvokeDeviceToolResponse);
  rpc SetDeviceWorkspace(SetDeviceWorkspaceRequest) returns (SetDeviceWorkspaceResponse);
  rpc GetDeviceCapabilities(GetDeviceCapabilitiesRequest) returns (GetDeviceCapabilitiesResponse);

  // External MCP servers (user-configured; execution and discovery in tools-service)
  rpc ExecuteMcpTool(ExecuteMcpToolRequest) returns (ExecuteMcpToolResponse);
  rpc GetMcpServerTools(GetMcpServerToolsRequest) returns (GetMcpServerToolsResponse);
  rpc DiscoverMcpServer(DiscoverMcpServerRequest) returns (DiscoverMcpServerResponse);

  // Profile guarantee
  rpc EnsureDefaultProfile(EnsureDefaultProfileRequest) returns (EnsureDefaultProfileResponse);
}

// Document Messages
message SearchRequest {
  string user_id = 1;
  string query = 2;
  int32 limit = 3;
  repeated string filters = 4;
  repeated string exclude_document_ids = 5;
}

message SearchResponse {
  repeated DocumentResult results = 1;
  int32 total_count = 2;
}

message FindDocumentsByTagsRequest {
  string user_id = 1;
  repeated string required_tags = 2;
  string collection_type = 3;  // "user", "global", or empty for both
  int32 limit = 4;
}

message FindDocumentsByTagsResponse {
  repeated DocumentResult results = 1;
  int32 total_count = 2;
}

// Rerank messages
message RerankRequest {
  string query = 1;
  repeated string documents = 2;
  int32 top_n = 3;
  string user_id = 4;
  string model = 5;
}

message RerankResultItem {
  int32 index = 1;
  float relevance_score = 2;
  string document = 3;
}

message RerankResponse {
  repeated RerankResultItem results = 1;
  string model = 2;
  bool success = 3;
  string error = 4;
}

message DocumentResult {
  string document_id = 1;
  string title = 2;
  string filename = 3;
  string content_preview = 4;
  float relevance_score = 5;
  map<string, string> metadata = 6;
}

message DocumentRequest {
  string document_id = 1;
  string user_id = 2;
}

message DocumentResponse {
  string document_id = 1;
  string title = 2;
  string filename = 3;
  string content_type = 4;
  map<string, string> metadata = 5;
}

message DocumentContentResponse {
  string document_id = 1;
  string content = 2;
  string format = 3;  // "text", "markdown", "html"
  // Absolute resolved path on document-service disk (API gateway uses for metadata.canonical_path).
  optional string canonical_path = 4;
}

// Resolved document link graph (wikilinks, org links, frontmatter refs, etc.)
message GetDocumentLinksRequest {
  string document_id = 1;
  string user_id = 2;
  string direction = 3;           // "outgoing" | "incoming" | "both"
  repeated string link_types = 4; // e.g. "wikilink"; empty = all types
  int32 limit = 5;                // max rows per direction; 0 = server default (50)
}

message DocumentLinkItem {
  string document_id = 1;
  string filename = 2;
  string title = 3;
  string canonical_path = 4;  // from metadata_json when present; else empty
  string link_type = 5;
  int32 line_number = 6;
  string direction = 7;       // "outgoing" | "incoming"
}

message GetDocumentLinksResponse {
  repeated DocumentLinkItem links = 1;
  int32 total = 2;
}

message DocumentChunksResponse {
  string document_id = 1;
  repeated DocumentChunk chunks = 2;
}

message DocumentChunk {
  string chunk_id = 1;
  string document_id = 2;
  string content = 3;
  int32 chunk_index = 4;
  string metadata = 5;  // JSON string of metadata
}

message FindDocumentByPathRequest {
  string user_id = 1;
  string file_path = 2;  // Relative or absolute filesystem path
  string base_path = 3;  // Base directory for resolving relative paths (optional)
}

message FindDocumentByPathResponse {
  bool success = 1;
  string document_id = 2;
  string filename = 3;
  string resolved_path = 4;  // Actual filesystem path found
  optional string error = 5;
}

// RSS Messages
message RSSSearchRequest {
  string user_id = 1;
  string query = 2;
  int32 limit = 3;
  bool unread_only = 4;
  bool starred_only = 5;
}

message RSSSearchResponse {
  repeated RSSFeed feeds = 1;
  repeated RSSArticle articles = 2;
}

message RSSFeed {
  string feed_id = 1;
  string feed_name = 2;
  string feed_url = 3;
  string description = 4;
}

message RSSArticle {
  string article_id = 1;
  string title = 2;
  string content = 3;
  string url = 4;
  string published_at = 5;
  string feed_id = 6;
  string feed_name = 7;
  bool is_read = 8;
  bool is_starred = 9;
  bool is_imported = 10;
  string created_at = 11;
}

message RSSArticlesRequest {
  string feed_id = 1;
  string user_id = 2;
  int32 limit = 3;
  bool unread_only = 4;
  bool starred_only = 5;
}

message RSSArticlesResponse {
  repeated RSSArticle articles = 1;
}

message ListStarredRSSArticlesRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListStarredRSSArticlesResponse {
  repeated RSSArticle articles = 1;
}

// RSS Management Messages
message AddRSSFeedRequest {
  string user_id = 1;
  string feed_url = 2;
  string feed_name = 3;
  string category = 4;
  bool is_global = 5;  // If true, creates a global feed (admin only)
}

message AddRSSFeedResponse {
  bool success = 1;
  string feed_id = 2;
  string feed_name = 3;
  string message = 4;
  optional string error = 5;
}

message ListRSSFeedsRequest {
  string user_id = 1;
  string scope = 2;  // "user" or "global"
}

message ListRSSFeedsResponse {
  repeated RSSFeedDetails feeds = 1;
  int32 count = 2;
  bool success = 3;
  optional string error = 4;
}

message RSSFeedDetails {
  string feed_id = 1;
  string feed_name = 2;
  string feed_url = 3;
  string category = 4;
  bool is_global = 5;
  string last_polled = 6;
  int32 article_count = 7;
  int32 unread_count = 8;
}

message RefreshRSSFeedRequest {
  string user_id = 1;
  string feed_name = 2;  // Feed name for user-friendly identification
  string feed_id = 3;     // Optional: direct feed ID
}

message RefreshRSSFeedResponse {
  bool success = 1;
  string feed_id = 2;
  string feed_name = 3;
  string task_id = 4;  // Celery task ID
  string message = 5;
  optional string error = 6;
}

message DeleteRSSFeedRequest {
  string user_id = 1;
  string feed_name = 2;  // Feed name for user-friendly identification
  string feed_id = 3;     // Optional: direct feed ID
}

message DeleteRSSFeedResponse {
  bool success = 1;
  string feed_id = 2;
  string message = 3;
  optional string error = 4;
}

message MarkArticleReadRequest {
  string user_id = 1;
  string article_id = 2;
}

message MarkArticleReadResponse {
  bool success = 1;
  string message = 2;
  optional string error = 3;
}

message MarkArticleUnreadRequest {
  string user_id = 1;
  string article_id = 2;
}

message MarkArticleUnreadResponse {
  bool success = 1;
  string message = 2;
  optional string error = 3;
}

message SetArticleStarredRequest {
  string user_id = 1;
  string article_id = 2;
  bool starred = 3;
}

message SetArticleStarredResponse {
  bool success = 1;
  string message = 2;
  optional string error = 3;
}

message GetUnreadCountsRequest {
  string user_id = 1;
}

message UnreadCountEntry {
  string feed_id = 1;
  int32 count = 2;
}

message GetUnreadCountsResponse {
  bool success = 1;
  repeated UnreadCountEntry counts = 2;
  optional string error = 3;
}

message ToggleFeedActiveRequest {
  string user_id = 1;
  string feed_id = 2;
  bool is_active = 3;
}

message ToggleFeedActiveResponse {
  bool success = 1;
  string feed_id = 2;
  bool is_active = 3;
  string message = 4;
  optional string error = 5;
}

// Entity Messages
