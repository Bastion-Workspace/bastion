message CreateDriveFolderResponse {
  bool success = 1;
  string item_id = 2;
  optional string error = 3;
}

message MoveDriveItemRequest {
  string access_token = 1;
  string provider = 2;
  string item_id = 3;
  string new_parent_item_id = 4;
}

message MoveDriveItemResponse {
  bool success = 1;
  optional string error = 2;
}

message DeleteDriveItemRequest {
  string access_token = 1;
  string provider = 2;
  string item_id = 3;
}

message DeleteDriveItemResponse {
  bool success = 1;
  optional string error = 2;
}

