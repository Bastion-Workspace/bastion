  string id = 1;
  string name = 2;
  string web_url = 3;
  bool is_folder = 4;
  string mime_type = 5;
  int64 size = 6;
  string parent_id = 7;
  string last_modified = 8;
}

message ListDriveItemsRequest {
  string access_token = 1;
  string provider = 2;
  string parent_item_id = 3;
  int32 top = 4;
}

message ListDriveItemsResponse {
  repeated DriveItem items = 1;
  optional string error = 2;
}

message GetDriveItemRequest {
  string access_token = 1;
  string provider = 2;
  string item_id = 3;
}

message GetDriveItemResponse {
  DriveItem item = 1;
  optional string error = 2;
}

message SearchDriveRequest {
  string access_token = 1;
  string provider = 2;
  string query = 3;
  int32 top = 4;
}

message SearchDriveResponse {
  repeated DriveItem items = 1;
  optional string error = 2;
}

message GetFileContentRequest {
  string access_token = 1;
  string provider = 2;
  string item_id = 3;
}

message GetFileContentResponse {
  string content_base64 = 1;
  string mime_type = 2;
  optional string error = 3;
}

message UploadFileRequest {
  string access_token = 1;
  string provider = 2;
  string parent_item_id = 3;
  string name = 4;
  string content_base64 = 5;
  string mime_type = 6;
}

message UploadFileResponse {
  bool success = 1;
  string item_id = 2;
  optional string error = 3;
}

message CreateDriveFolderRequest {
  string access_token = 1;
  string provider = 2;
  string parent_item_id = 3;
