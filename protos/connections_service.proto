message TodoList {
  string id = 1;
  string display_name = 2;
  bool is_owner = 3;
  bool is_shared = 4;
  string well_known_list_name = 5;
}

message TodoTask {
  string id = 1;
  string list_id = 2;
  string title = 3;
  string status = 4;
  string body = 5;
  string due_datetime = 6;
  string importance = 7;
}

message ListTodoListsRequest {
  string access_token = 1;
  string provider = 2;
}

message ListTodoListsResponse {
  repeated TodoList lists = 1;
  optional string error = 2;
}

message GetTodoTasksRequest {
  string access_token = 1;
  string provider = 2;
  string list_id = 3;
  int32 top = 4;
}

message GetTodoTasksResponse {
  repeated TodoTask tasks = 1;
  optional string error = 2;
}

message CreateTodoTaskRequest {
  string access_token = 1;
  string provider = 2;
  string list_id = 3;
  string title = 4;
  string body = 5;
  string due_datetime = 6;
  string importance = 7;
}

message CreateTodoTaskResponse {
  bool success = 1;
  string task_id = 2;
  optional string error = 3;
}

message UpdateTodoTaskRequest {
  string access_token = 1;
  string provider = 2;
  string list_id = 3;
  string task_id = 4;
  optional string title = 5;
  optional string body = 6;
  optional string status = 7;
  optional string due_datetime = 8;
  optional string importance = 9;
}

message UpdateTodoTaskResponse {
  bool success = 1;
  optional string error = 2;
}

message DeleteTodoTaskRequest {
  string access_token = 1;
  string provider = 2;
  string list_id = 3;
  string task_id = 4;
}

message DeleteTodoTaskResponse {
  bool success = 1;
  optional string error = 2;
}

