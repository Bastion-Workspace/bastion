}

// ============================================================================
// Messaging Bots (Telegram, Discord)
// ============================================================================

message RegisterBotRequest {
  string connection_id = 1;   // external_connections.id
  string user_id = 2;
  string provider = 3;       // "telegram" or "discord"
  string bot_token = 4;       // Decrypted bot token
  string display_name = 5;
  map<string, string> config = 6;  // Platform-specific config
}

message RegisterBotResponse {
  bool success = 1;
  string bot_username = 2;    // Resolved bot identity
  optional string error = 3;
}

message UnregisterBotRequest {
  string connection_id = 1;
}

message UnregisterBotResponse {
  bool success = 1;
  optional string error = 2;
}

message GetBotStatusRequest {
  string connection_id = 1;
}

message GetBotStatusResponse {
  string status = 1;   // "running", "stopped", "error"
  string bot_username = 2;
  optional string error = 3;
}

// ============================================================================
// Outbound Messaging (agent-initiated notifications via bots)
// ============================================================================

message SendOutboundMessageRequest {
  string user_id = 1;          // Target user
  string provider = 2;         // "telegram" or "discord"
  string connection_id = 3;    // Specific connection; empty = default for provider
  string message = 4;          // Message text (max 4000 chars)
  string format = 5;           // "markdown", "plain", or "html" (default: markdown)
  string recipient_chat_id = 6; // Optional. Platform chat/channel ID (Telegram chat_id, Discord channel id). If empty, uses stored outbound_chat_id for the connection.
}

message SendOutboundMessageResponse {
  bool success = 1;
  string message_id = 2;       // Provider message ID
  string channel = 3;          // Channel that was used (e.g. "telegram")
  optional string error = 4;
}

// ============================================================================
// Data Source Connector Execution
// ============================================================================

message ExecuteConnectorEndpointRequest {
  string definition_json = 1;   // Full connector definition (base_url, auth, endpoints)
  string credentials_json = 2;   // Decrypted credentials dict as JSON
  string endpoint_id = 3;
  string params_json = 4;        // Optional; param values as JSON object
  int32 max_pages = 5;           // Default 5
  string oauth_token = 6;       // Optional Bearer token when auth type is oauth_connection
  bool raw_response = 7;        // When true, include full API response in response
}

message ExecuteConnectorEndpointResponse {
  bool success = 1;
  string records_json = 2;      // JSON array of records
  int32 count = 3;
  string formatted = 4;        // Human-readable summary
  string raw_response_json = 5; // When requested; full API response as JSON
  optional string error = 6;
}

// ============================================================================
// Raw HTTP Probe (API discovery - no connector definition)
// ============================================================================

message ProbeApiEndpointRequest {
  string url = 1;
  string method = 2;       // GET, POST, PUT, etc.
  string headers_json = 3;  // Optional JSON object of headers
  string body_json = 4;    // Optional body for POST/PUT
  string params_json = 5;  // Optional query params as JSON object
}

message ProbeApiEndpointResponse {
  bool success = 1;
  int32 status_code = 2;
  string response_headers_json = 3;
  string response_body = 4;   // Truncated to 50KB
  string content_type = 5;
  optional string error = 6;
}
