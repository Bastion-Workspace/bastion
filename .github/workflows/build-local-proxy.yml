name: Build Local Proxy Daemon

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'local-proxy/**'
      - '.github/workflows/build-local-proxy.yml'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Native GUI (egui/eframe), tray, screenshots (xcap), and notifications pull in
      # GLib/GTK/XCB via pkg-config; runners do not include these by default.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libdbus-1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: local-proxy

      - name: Build release
        working-directory: local-proxy
        run: cargo build --release

      - name: Prepare artifact
        run: |
          mkdir -p local-proxy-artifact
          cp local-proxy/target/release/bastion-local-proxy local-proxy-artifact/bastion-proxy-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bastion-proxy-linux-amd64
          path: local-proxy-artifact/bastion-proxy-linux-amd64
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: local-proxy

      - name: Build release
        working-directory: local-proxy
        run: cargo build --release

      - name: Prepare artifact
        run: |
          New-Item -ItemType Directory -Force -Path local-proxy-artifact
          Copy-Item local-proxy/target/release/bastion-local-proxy.exe local-proxy-artifact/bastion-proxy-windows-amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bastion-proxy-windows-amd64
          path: local-proxy-artifact/bastion-proxy-windows-amd64.exe
          retention-days: 30

  release:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: bastion-proxy-linux-amd64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: bastion-proxy-windows-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bastion-proxy-linux-amd64/bastion-proxy-linux-amd64
            bastion-proxy-windows-amd64/bastion-proxy-windows-amd64.exe
          draft: false
          prerelease: ${{ contains(github.ref, '-dev') }}
          body: |
            ## Bastion Local Proxy Daemon

            Run on your machine to let Bastion agents use local capabilities (screenshot, future: shell, files).

            - **Linux:** `bastion-proxy-linux-amd64` (make executable: `chmod +x bastion-proxy-linux-amd64`)
            - **Windows:** `bastion-proxy-windows-amd64.exe`

            Configure Bastion URL and device token in Settings > Device tokens, then paste the token into the daemon (tray menu > Settings).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
