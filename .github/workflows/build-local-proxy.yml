name: Build Local Proxy Daemon

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'local-proxy/**'
      - '.github/workflows/build-local-proxy.yml'
  workflow_dispatch:

jobs:
  build-linux:
    # Use 22.04 (glibc ~2.35, libssl3) so the .deb and Linux binary install on Debian 12
    # and older Ubuntu. ubuntu-latest pulls glibc 2.39+ and libssl3t64 in Depends, which
    # breaks `dpkg -i` on bookworm (libc6 2.36, no t64 package name).
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Native GUI (egui/eframe), tray, screenshots (xcap), PipeWire (libspa-sys /
      # Wayland paths), GBM/EGL (glutin), libxdo (tray/muda), and notifications pull
      # in GLib/GTK/XCB via pkg-config; runners do not include these by default.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libxdo-dev \
            dpkg-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: local-proxy

      - name: Build headless release (.deb)
        working-directory: local-proxy
        run: |
          chmod +x debian/postinst debian/prerm
          cargo build --release --no-default-features

      - name: Install cargo-deb and package
        working-directory: local-proxy
        run: |
          cargo install cargo-deb
          cargo deb --no-build

      - name: Build GUI release binary
        working-directory: local-proxy
        run: cargo build --release

      - name: Prepare artifacts
        run: |
          mkdir -p local-proxy-artifact
          cp local-proxy/target/release/bastion-local-proxy local-proxy-artifact/bastion-proxy-linux-amd64
          cp local-proxy/target/debian/bastion-proxy_*.deb local-proxy-artifact/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bastion-proxy-linux-amd64
          path: local-proxy-artifact/bastion-proxy-linux-amd64
          retention-days: 30

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: bastion-proxy-deb-amd64
          path: local-proxy-artifact/*.deb
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          working-directory: local-proxy

      - name: Build release
        working-directory: local-proxy
        run: cargo build --release

      - name: Prepare artifact
        run: |
          New-Item -ItemType Directory -Force -Path local-proxy-artifact
          Copy-Item local-proxy/target/release/bastion-local-proxy.exe local-proxy-artifact/bastion-proxy-windows-amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bastion-proxy-windows-amd64
          path: local-proxy-artifact/bastion-proxy-windows-amd64.exe
          retention-days: 30

  release:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: bastion-proxy-linux-amd64

      - name: Download Linux .deb
        uses: actions/download-artifact@v4
        with:
          name: bastion-proxy-deb-amd64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: bastion-proxy-windows-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bastion-proxy-linux-amd64/bastion-proxy-linux-amd64
            bastion-proxy-deb-amd64/*.deb
            bastion-proxy-windows-amd64/bastion-proxy-windows-amd64.exe
          draft: false
          prerelease: ${{ contains(github.ref, '-dev') }}
          body: |
            ## Bastion Local Proxy Daemon

            Run on your machine to let Bastion agents use local capabilities (screenshot, shell, files, etc.).

            - **Linux (desktop, tray + settings):** `bastion-proxy-linux-amd64` (`chmod +x bastion-proxy-linux-amd64`)
            - **Linux (headless / systemd, Debian/Ubuntu):** `*.deb` — built on Ubuntu 22.04 for broad compatibility (e.g. Debian 12). Install with `sudo dpkg -i bastion-proxy_*_amd64.deb`, edit `/etc/bastion-proxy/config.yml`, then `sudo systemctl enable --now bastion-proxy`
            - **Windows:** `bastion-proxy-windows-amd64.exe`

            Configure Bastion URL and device token in Settings > Device tokens (web UI), then paste the token into the daemon (tray > Settings), or into `/etc/bastion-proxy/config.yml` for the `.deb` service.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
