            BASTION_RUNTIME_UID=${{ env.BASTION_RUNTIME_UID }}
            BASTION_RUNTIME_GID=${{ env.BASTION_RUNTIME_GID }}

      - name: Build and push bbs-server
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_scope == 'all' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./bbs-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-bbs-server:${{ steps.metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-bbs-server:${{ steps.metadata.outputs.latest_tag }}
