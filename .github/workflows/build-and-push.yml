            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-connections-service:${{ steps.metadata.outputs.latest_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-connections-service:sha-${{ steps.metadata.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-connections-service:${{ steps.metadata.outputs.branch }}
          cache-from: type=gha
