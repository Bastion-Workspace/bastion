            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-cli-worker:sha-${{ steps.metadata.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-cli-worker:${{ steps.metadata.outputs.branch }}
