        with:
          context: .
          file: ./data-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-data-service:${{ steps.metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-data-service:${{ steps.metadata.outputs.latest_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-data-service:sha-${{ steps.metadata.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-data-service:${{ steps.metadata.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BASTION_RUNTIME_UID=${{ env.BASTION_RUNTIME_UID }}
            BASTION_RUNTIME_GID=${{ env.BASTION_RUNTIME_GID }}

      - name: Build and push image-vision-service
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_scope == 'all' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./image-vision-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-image-vision-service:${{ steps.metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-image-vision-service:${{ steps.metadata.outputs.latest_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-image-vision-service:sha-${{ steps.metadata.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-image-vision-service:${{ steps.metadata.outputs.branch }}
