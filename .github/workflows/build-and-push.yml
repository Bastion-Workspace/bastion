            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-llm-orchestrator:sha-${{ steps.metadata.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-llm-orchestrator:${{ steps.metadata.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BASTION_RUNTIME_UID=${{ env.BASTION_RUNTIME_UID }}
            BASTION_RUNTIME_GID=${{ env.BASTION_RUNTIME_GID }}

      - name: Build and push vector-service
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_scope == 'all' }}
