            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-bbs-server:${{ steps.metadata.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BASTION_RUNTIME_UID=${{ env.BASTION_RUNTIME_UID }}
            BASTION_RUNTIME_GID=${{ env.BASTION_RUNTIME_GID }}

      - name: Summary
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          BUILD_SCOPE: ${{ github.event.inputs.build_scope }}
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.metadata.outputs.is_dev }}" == "true" ]]; then
            echo "**Channel:** dev — images are \`ghcr.io/.../bastion-dev-*\` (keep packages **private**; separate from production)." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Channel:** production — images are \`ghcr.io/.../bastion-*\` (set GHCR package visibility **public** for anonymous pulls; see \`.github/workflows/README.md\`)." >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "$BUILD_SCOPE" == "postgres_only" ]]; then
            echo "**Build scope:** \`postgres_only\` — only DB images were built; re-run with \`all\` (or push a \`v*\` tag) for the rest." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Version:** ${{ steps.metadata.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Latest Tag:** ${{ steps.metadata.outputs.latest_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**SHA:** ${{ steps.metadata.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch label:** ${{ steps.metadata.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image prefix:** \`${REGISTRY}/${IMAGE_PREFIX}-\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images built (GHCR)" >> $GITHUB_STEP_SUMMARY
          echo "- postgres (SQL init baked in)" >> $GITHUB_STEP_SUMMARY
          echo "- postgres-data (data workspace SQL init baked in)" >> $GITHUB_STEP_SUMMARY
          if [[ "$BUILD_SCOPE" != "postgres_only" ]]; then
            echo "- backend" >> $GITHUB_STEP_SUMMARY
