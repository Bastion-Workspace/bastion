            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-tools-service:sha-${{ steps.metadata.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-tools-service:${{ steps.metadata.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
