name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BASTION_RUNTIME_UID: "10001"
  BASTION_RUNTIME_GID: "10001"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # GHCR / OCI require lowercase paths; github.repository_owner preserves org casing.
      - name: Set GHCR image prefix (lowercase)
        run: |
          owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=${owner_lc}/bastion" >> "$GITHUB_ENV"
          echo "Using IMAGE_PREFIX=${owner_lc}/bastion"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and metadata
        id: metadata
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Detect if dev or production
          if [[ "$VERSION" == *"-dev" ]]; then
            echo "is_dev=true" >> $GITHUB_OUTPUT
            echo "latest_tag=latest-dev" >> $GITHUB_OUTPUT
          else
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          fi
          
          # Get git SHA (short)
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          
          # Get branch name (from tag or default)
          BRANCH=${GITHUB_REF#refs/heads/}
          if [[ "$BRANCH" == "refs/tags/"* ]]; then
            # Extract branch from tag context or use default
            if [[ "$VERSION" == *"-dev" ]]; then
              BRANCH="dev"
            else
              BRANCH="main"
            fi
          fi
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          
          echo "Version: $VERSION"
          if [[ "$VERSION" == *"-dev" ]]; then
            echo "Is Dev: true"
            echo "Latest Tag: latest-dev"
          else
            echo "Is Dev: false"
            echo "Latest Tag: latest"
          fi
          echo "SHA: $SHA"
          echo "Branch: $BRANCH"

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.metadata.outputs.latest_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:sha-${{ steps.metadata.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.metadata.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BASTION_RUNTIME_UID=${{ env.BASTION_RUNTIME_UID }}
            BASTION_RUNTIME_GID=${{ env.BASTION_RUNTIME_GID }}

      - name: Build and push tools-service
        uses: docker/build-push-action@v5
