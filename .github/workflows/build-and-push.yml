            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-celery-beat:${{ steps.metadata.outputs.latest_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-celery-beat:sha-${{ steps.metadata.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-celery-beat:${{ steps.metadata.outputs.branch }}
          cache-from: type=gha
