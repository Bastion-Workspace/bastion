name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version label (leave empty to use VERSION file from the selected branch)'
        required: false
        type: string
      build_scope:
        description: 'postgres_only publishes just bastion-postgres + bastion-postgres-data (quick first run). all builds every image.'
        required: false
        default: all
        type: choice
        options:
          - all
          - postgres_only

env:
  REGISTRY: ghcr.io
  BASTION_RUNTIME_UID: "10001"
  BASTION_RUNTIME_GID: "10001"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Default Ubuntu runners have ~14 GB free; many sequential docker builds + GHA
      # cache export (especially mode=max) can fill the disk. Remove preinstalled tooling
      # we do not need (this job only uses Docker).
      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Extract version and metadata
        id: metadata
        env:
          VERSION_INPUT: ${{ inputs.version || '' }}
        run: |
          # Version: explicit workflow input, else git tag (v*), else VERSION file (manual runs)
          if [[ -n "${VERSION_INPUT// }" ]]; then
            VERSION="${VERSION_INPUT// }"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(tr -d '[:space:]' < VERSION)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Detect if dev or production (e.g. 0.70.5-dev vs 0.70.0). Drives GHCR package family:
          # - production → ghcr.io/<owner>/bastion-<service> (intended public)
          # - dev        → ghcr.io/<owner>/bastion-dev-<service> (stays private; separate package name)
          if [[ "$VERSION" == *"-dev" ]]; then
            echo "is_dev=true" >> $GITHUB_OUTPUT
            echo "latest_tag=latest-dev" >> $GITHUB_OUTPUT
            echo "image_base=bastion-dev" >> $GITHUB_OUTPUT
          else
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
            echo "image_base=bastion" >> $GITHUB_OUTPUT
          fi
          
          # Get git SHA (short)
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          
          # Get branch name (from tag or default)
          BRANCH=${GITHUB_REF#refs/heads/}
          if [[ "$BRANCH" == "refs/tags/"* ]]; then
            if [[ "$VERSION" == *"-dev" ]]; then
              BRANCH="dev"
            else
              BRANCH="main"
            fi
          fi
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          
          echo "Version: $VERSION"
          if [[ "$VERSION" == *"-dev" ]]; then
            echo "Is Dev: true"
            echo "Latest Tag: latest-dev"
            echo "Image base: bastion-dev-* (private channel)"
          else
            echo "Is Dev: false"
            echo "Latest Tag: latest"
            echo "Image base: bastion-* (production channel)"
          fi
          echo "SHA: $SHA"
          echo "Branch: $BRANCH"

      # GHCR / OCI require lowercase paths; github.repository_owner preserves org casing.
      - name: Set GHCR image prefix (lowercase)
        run: |
          owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=${owner_lc}/${{ steps.metadata.outputs.image_base }}" >> "$GITHUB_ENV"
          echo "Using IMAGE_PREFIX=${owner_lc}/${{ steps.metadata.outputs.image_base }}"

      - name: Ensure ref matches release channel (main vs dev)
        env:
          IS_DEV: ${{ steps.metadata.outputs.is_dev }}
        run: |
          set -euo pipefail
          git fetch origin main
          if [[ "$IS_DEV" == "true" ]]; then
            git fetch origin dev
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            SHA=$(git rev-parse HEAD)
            if [[ "$IS_DEV" == "true" ]]; then
              git merge-base --is-ancestor "$SHA" origin/dev || {
                echo "::error::Dev image tags (version ending in -dev) must point at a commit on origin/dev."
                exit 1
              }
            else
              git merge-base --is-ancestor "$SHA" origin/main || {
                echo "::error::Production image tags must point at a commit on origin/main."
                exit 1
              }
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "$IS_DEV" == "true" ]]; then
              [[ "${{ github.ref }}" == "refs/heads/dev" ]] || {
                echo "::error::Manual dev builds (-dev VERSION) must be run from the dev branch."
                exit 1
              }
            else
              [[ "${{ github.ref }}" == "refs/heads/main" ]] || {
                echo "::error::Manual production builds must be run from the main branch."
                exit 1
              }
            fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push postgres (bundled backend/sql init)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: postgres/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres:${{ steps.metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres:${{ steps.metadata.outputs.latest_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres:sha-${{ steps.metadata.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres:${{ steps.metadata.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          build-args: BUILDKIT_INLINE_CACHE=1

      - name: Build and push postgres-data (bundled data-service/sql init)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: postgres-data/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres-data:${{ steps.metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres-data:${{ steps.metadata.outputs.latest_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres-data:sha-${{ steps.metadata.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres-data:${{ steps.metadata.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          build-args: BUILDKIT_INLINE_CACHE=1

      - name: Build and push backend
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_scope == 'all' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.metadata.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.metadata.outputs.latest_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:sha-${{ steps.metadata.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.metadata.outputs.branch }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BASTION_RUNTIME_UID=${{ env.BASTION_RUNTIME_UID }}
            BASTION_RUNTIME_GID=${{ env.BASTION_RUNTIME_GID }}

      - name: Build and push tools-service
