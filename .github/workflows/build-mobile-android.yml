# Re-run failed jobs on an old commit still uses that commit (no YAML updates). After workflow
# fixes, use "Run workflow" here or push to main; tag-only re-run keeps the old tree.
name: Build Bastion Mobile (Android)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'mobile/**'
      - '.github/workflows/build-mobile-android.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      # write required for softprops/action-gh-release (create release + upload APK)
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package.json

      - name: Install dependencies
        working-directory: ./mobile
        run: npm install

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(node -p "require('./mobile/package.json').version")
            VERSION="${VERSION}-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Expo prebuild (Android)
        working-directory: ./mobile
        run: npx expo prebuild --platform android --no-install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-mobile-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-mobile-

      - name: Assemble debug APK
        working-directory: ./mobile/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bastion-mobile-android-debug
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/android/app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: ${{ contains(github.ref, '-dev') }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Bastion Mobile (Android debug APK)

            **Version:** ${{ steps.version.outputs.version }}

            Install the APK on a device or emulator. The bundle is **embedded** in this debug APK (no Metro required). Set **API base URL** via `EXPO_PUBLIC_API_BASE_URL` at build time (see `mobile/env.example`).

            Debug builds use the default debug keystore (not for Play Store). For Play Store signing, add keystore secrets and switch the workflow to `assembleRelease` / `bundleRelease`.

      - name: Build summary
        run: |
          echo "## Mobile Android build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** bastion-mobile-android-debug (APK)" >> $GITHUB_STEP_SUMMARY
