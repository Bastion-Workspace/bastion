syntax = "proto3";

package dataservice;

// ==================== Data Service ====================
service DataService {
  // Workspace operations
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (WorkspaceResponse);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (WorkspaceListResponse);
  rpc GetWorkspace(GetWorkspaceRequest) returns (WorkspaceResponse);
  rpc UpdateWorkspace(UpdateWorkspaceRequest) returns (WorkspaceResponse);
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (DeleteResponse);
  
  // Database operations
  rpc CreateDatabase(CreateDatabaseRequest) returns (DatabaseResponse);
  rpc ListDatabases(ListDatabasesRequest) returns (DatabaseListResponse);
  rpc GetDatabase(GetDatabaseRequest) returns (DatabaseResponse);
  rpc DeleteDatabase(DeleteDatabaseRequest) returns (DeleteResponse);
  
  // Table operations
  rpc CreateTable(CreateTableRequest) returns (TableResponse);
  rpc ListTables(ListTablesRequest) returns (TableListResponse);
  rpc GetTable(GetTableRequest) returns (TableResponse);
  rpc UpdateTable(UpdateTableRequest) returns (TableResponse);
  rpc DeleteTable(DeleteTableRequest) returns (DeleteResponse);
  rpc GetTableData(GetTableDataRequest) returns (TableDataResponse);
  rpc ExportTableData(ExportTableDataRequest) returns (stream ExportTableDataChunk);
  rpc InsertRow(InsertRowRequest) returns (RowResponse);
  rpc UpdateRow(UpdateRowRequest) returns (RowResponse);
  rpc UpdateCell(UpdateCellRequest) returns (RowResponse);
  rpc ResolveWorkspaceLink(ResolveWorkspaceLinkRequest) returns (ResolveWorkspaceLinkResponse);
  rpc DeleteRow(DeleteRowRequest) returns (DeleteResponse);
  rpc RecalculateTable(RecalculateTableRequest) returns (RecalculateTableResponse);
  
  // Import operations
  rpc PreviewImport(PreviewImportRequest) returns (PreviewImportResponse);
  rpc ExecuteImport(ExecuteImportRequest) returns (ImportJobResponse);
  rpc GetImportStatus(GetImportStatusRequest) returns (ImportJobResponse);
  
  // Query operations
  rpc ExecuteSQLQuery(SQLQueryRequest) returns (QueryResultResponse);
  rpc ExecuteNaturalLanguageQuery(NLQueryRequest) returns (QueryResultResponse);
  
  // Transformation operations
  rpc ApplyFilter(FilterRequest) returns (TransformResultResponse);
  rpc ApplyAggregation(AggregationRequest) returns (TransformResultResponse);
  rpc ApplyJoin(JoinRequest) returns (TransformResultResponse);
  
  // Visualization operations
  rpc GenerateVisualization(VisualizationRequest) returns (VisualizationResponse);
  rpc ListVisualizations(ListVisualizationsRequest) returns (VisualizationListResponse);
  
  // Styling operations
  rpc CreateStylingRule(CreateStylingRuleRequest) returns (StylingRuleResponse);
  rpc GetStylingRules(GetStylingRulesRequest) returns (StylingRulesResponse);
  rpc ApplyStylingToData(ApplyStylingRequest) returns (StyledDataResponse);
  
  // Health check
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ==================== Common Messages ====================
message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
  string service_name = 2;
  string version = 3;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}

// ==================== Workspace Messages ====================
message CreateWorkspaceRequest {
  string user_id = 1;
  string name = 2;
  string description = 3;
  string icon = 4;
  string color = 5;
}

message ListWorkspacesRequest {
  string user_id = 1;
}

message GetWorkspaceRequest {
  string workspace_id = 1;
  string user_id = 2;
  repeated string user_team_ids = 3;
}

message UpdateWorkspaceRequest {
  string workspace_id = 1;
  string name = 2;
  string description = 3;
  string icon = 4;
  string color = 5;
  bool is_pinned = 6;
  string user_id = 7;
}

message DeleteWorkspaceRequest {
  string workspace_id = 1;
  string user_id = 2;
  repeated string user_team_ids = 3;
}

message WorkspaceResponse {
  string workspace_id = 1;
  string user_id = 2;
  string name = 3;
  string description = 4;
  string icon = 5;
  string color = 6;
  bool is_pinned = 7;
  string metadata_json = 8;
  string created_at = 9;
  string updated_at = 10;
  string updated_by = 11;
}

message WorkspaceListResponse {
  repeated WorkspaceResponse workspaces = 1;
  int32 total_count = 2;
}

// ==================== Database Messages ====================
message CreateDatabaseRequest {
  string workspace_id = 1;
  string name = 2;
  string description = 3;
  string source_type = 4;
  string user_id = 5;
}

message ListDatabasesRequest {
  string workspace_id = 1;
  string user_id = 2;
  repeated string user_team_ids = 3;
}

message GetDatabaseRequest {
  string database_id = 1;
  string user_id = 2;
  repeated string user_team_ids = 3;
}

message DeleteDatabaseRequest {
  string database_id = 1;
  string user_id = 2;
  repeated string user_team_ids = 3;
}

message DatabaseResponse {
  string database_id = 1;
  string workspace_id = 2;
  string name = 3;
  string description = 4;
  string source_type = 5;
  int32 table_count = 6;
  int64 total_rows = 7;
  string created_at = 8;
  string metadata_json = 9;
  string updated_at = 10;
  string created_by = 11;
  string updated_by = 12;
}

message DatabaseListResponse {
  repeated DatabaseResponse databases = 1;
  int32 total_count = 2;
}

// ==================== Table Messages ====================
message CreateTableRequest {
  string database_id = 1;
  string name = 2;
  string description = 3;
  string schema_json = 4;
  string user_id = 5;
  string metadata_json = 6;
}

message ListTablesRequest {
  string database_id = 1;
  string user_id = 2;
  repeated string user_team_ids = 3;
}

message TableListResponse {
  repeated TableResponse tables = 1;
  int32 total_count = 2;
}

message GetTableRequest {
  string table_id = 1;
  string user_id = 2;
  repeated string user_team_ids = 3;
  string database_id = 4;  // Optional: required to resolve schema-only (DDL-created) tables
}

message UpdateTableRequest {
  string table_id = 1;
  string name = 2;
  string description = 3;
  string schema_json = 4;
  string user_id = 5;
  repeated string user_team_ids = 6;
  string metadata_json = 7;
}

message DeleteTableRequest {
  string table_id = 1;
  string user_id = 2;
  repeated string user_team_ids = 3;
}

message GetTableDataRequest {
  string table_id = 1;
  int32 offset = 2;
  int32 limit = 3;
  string user_id = 4;
  repeated string user_team_ids = 5;
  string database_id = 6;  // Optional: required to resolve schema-only (DDL-created) tables
  bool prefer_arrow = 7;   // When true, return table page as Arrow IPC in TableDataResponse.arrow_data
}

message InsertRowRequest {
  string table_id = 1;
  string row_data_json = 2;
  string user_id = 3;
}

message UpdateRowRequest {
  string table_id = 1;
  string row_id = 2;
  string row_data_json = 3;
  string user_id = 4;
}

message UpdateCellRequest {
  string table_id = 1;
  string row_id = 2;
  string column_name = 3;
  string value_json = 4;
  string user_id = 5;
  string formula = 6;  // Optional formula string (e.g., "=A1+B1")
}

message DeleteRowRequest {
  string table_id = 1;
  string row_id = 2;
}

message TableResponse {
  string table_id = 1;
  string database_id = 2;
  string name = 3;
  string description = 4;
  int32 row_count = 5;
  string schema_json = 6;
  string styling_rules_json = 7;
  string metadata_json = 8;
  string created_at = 9;
  string updated_at = 10;
  string created_by = 11;
  string updated_by = 12;
  string storage_type = 13;  // "native" or "jsonb"
}

message TableDataResponse {
  string table_id = 1;
  repeated RowResponse rows = 2;
  int32 total_rows = 3;
  string schema_json = 4;
  bytes arrow_data = 5;      // Arrow IPC RecordBatch when has_arrow_data is true
  bool has_arrow_data = 6;
  bool native_arrow = 7;     // When true, arrow_data is flat typed columns (not JSON-wrapped row_data)
}

message RowResponse {
  string row_id = 1;
  string row_data_json = 2;
  int32 row_index = 3;
  string row_color = 4;
  string formula_data_json = 5;  // Optional formula data JSON
}

message ResolveWorkspaceLinkRequest {
  string user_id = 1;
  string ref_json = 2;
}

message ResolveWorkspaceLinkResponse {
  bool success = 1;
  string error = 2;
  string label = 3;
  string preview_json = 4;
  bool row_found = 5;
  string table_id = 6;
  string row_id = 7;
}

message ExportTableDataRequest {
  string table_id = 1;
  string user_id = 2;
  string format = 3;  // "csv", "parquet", "arrow_ipc"
  repeated string user_team_ids = 4;
  string database_id = 5;
}

message ExportTableDataChunk {
  bytes data = 1;
  bool is_last = 2;
}

// ==================== Import Messages ====================
message PreviewImportRequest {
  string workspace_id = 1;
  string file_path = 2;
  string file_type = 3;
  int32 preview_rows = 4;
}

message PreviewImportResponse {
  repeated string column_names = 1;
  repeated string inferred_types = 2;
  string preview_data_json = 3;
  int32 estimated_rows = 4;
}

message ExecuteImportRequest {
  string workspace_id = 1;
  string database_id = 2;
  string table_name = 3;
  string file_path = 4;
  string field_mapping_json = 5;
  string user_id = 6;
}

message ImportJobResponse {
  string job_id = 1;
  string status = 2;
  int32 rows_processed = 3;
  int32 rows_total = 4;
  string error_log = 5;
  string started_at = 6;
  string completed_at = 7;
}

message GetImportStatusRequest {
  string job_id = 1;
}

// ==================== Query Messages ====================
message SQLQueryRequest {
  string workspace_id = 1;
  string sql_query = 2;
  int32 limit = 3;
  string user_id = 4;
  repeated string user_team_ids = 5;
  string params_json = 6;  // JSON array of values for $1, $2, ... binding
  bool read_only = 7;  // When true, only SELECT is allowed
  bool prefer_arrow = 8; // When true, return SELECT results as Arrow IPC in QueryResultResponse.arrow_results
}

message NLQueryRequest {
  string workspace_id = 1;
  string natural_language_query = 2;
  bool include_documents = 3;
  string user_id = 4;
  repeated string user_team_ids = 5;
  bool read_only = 6;  // When true, only SELECT is allowed after NL-to-SQL
  bool prefer_arrow = 7;
}

message QueryResultResponse {
  string query_id = 1;
  repeated string column_names = 2;
  string results_json = 3;
  int32 result_count = 4;
  int32 execution_time_ms = 5;
  string generated_sql = 6;
  string error_message = 7;
  int32 rows_affected = 8;       // For INSERT/UPDATE/DELETE
  string returning_rows_json = 9;  // For write with RETURNING clause
  bytes arrow_results = 10;      // Arrow IPC RecordBatch when has_arrow_data is true
  bool has_arrow_data = 11;
}

// ==================== Transformation Messages ====================
message FilterRequest {
  string table_id = 1;
  string filter_json = 2;
}

message AggregationRequest {
  string table_id = 1;
  string aggregation_json = 2;
}

message JoinRequest {
  string left_table_id = 1;
  string right_table_id = 2;
  string join_config_json = 3;
}

message TransformResultResponse {
  string transformation_id = 1;
  string result_preview_json = 2;
  int32 result_rows = 3;
}

// ==================== Visualization Messages ====================
message VisualizationRequest {
  string workspace_id = 1;
  string table_id = 2;
  string name = 3;
  string viz_type = 4;
  string config_json = 5;
  string color_scheme = 6;
  string created_by = 7;
}

message ListVisualizationsRequest {
  string workspace_id = 1;
}

message VisualizationResponse {
  string visualization_id = 1;
  string workspace_id = 2;
  string table_id = 3;
  string name = 4;
  string viz_type = 5;
  string config_json = 6;
  string color_scheme = 7;
  bool is_pinned = 8;
  string created_at = 9;
}

message VisualizationListResponse {
  repeated VisualizationResponse visualizations = 1;
  int32 total_count = 2;
}

// ==================== Styling Messages ====================
message CreateStylingRuleRequest {
  string table_id = 1;
  string rule_name = 2;
  string rule_type = 3;
  string target_column = 4;
  string condition_json = 5;
  string color = 6;
  string background_color = 7;
  int32 priority = 8;
  string created_by = 9;
}

message GetStylingRulesRequest {
  string table_id = 1;
}

message ApplyStylingRequest {
  string table_id = 1;
  string data_json = 2;
}

message StylingRuleResponse {
  string rule_id = 1;
  string table_id = 2;
  string rule_name = 3;
  string rule_type = 4;
  string target_column = 5;
  string condition_json = 6;
  string color = 7;
  string background_color = 8;
  int32 priority = 9;
  bool is_active = 10;
}

message StylingRulesResponse {
  repeated StylingRuleResponse rules = 1;
  int32 total_count = 2;
}

message StyledDataResponse {
  string styled_data_json = 1;
  repeated StylingRuleResponse applied_rules = 2;
}

// ==================== Formula Messages ====================
message RecalculateTableRequest {
  string table_id = 1;
  string user_id = 2;
}

message RecalculateTableResponse {
  bool success = 1;
  int32 cells_recalculated = 2;
  string error_message = 3;
}


